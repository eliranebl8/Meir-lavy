<body>

    var db = firebase.firestore();

    var DEFAULT_PASSWORDS = { father:"1111", mother:"2222", grandma:"3333" };
    var DEFAULT_CHILD_PASSWORDS = { meir:"1234", lavi:"1234", itai:"1234", noya:"1234" };

    var PASSWORDS = { father:"1111", mother:"2222", grandma:"3333" };

    function createEmptyPresetTasks(){
      return {
        meir: { father: [], mother: [], grandma: [] },
        lavi: { father: [], mother: [], grandma: [] },
        itai: { father: [], mother: [], grandma: [] },
        noya: { father: [], mother: [], grandma: [] }
      };
    }

    function normalizePresetTasks(raw){
      var base = createEmptyPresetTasks();
      if(!raw || typeof raw !== 'object') return base;

      var childKeys = ['meir','lavi','itai','noya'];
      var roleKeys = ['father','mother','grandma'];

      childKeys.forEach(function(childId){
        var childObj = raw[childId] || {};
        roleKeys.forEach(function(role){
          base[childId][role] = Array.isArray(childObj[role]) ? childObj[role].slice(0,3) : [];
        });
      });

      return base;
    }

    function getPresetTasks(role, childId){
      var normalized = APP_SETTINGS.presetTasks || {};
      if(!normalized[childId]) return [];
      return Array.isArray(normalized[childId][role]) ? normalized[childId][role] : [];
    }

    function setSelectedChild(role, childId){
      SELECTED_PARENT_CHILD[role] = childId;
      parent(role);
    }

    function safeNumber(v){ return Number(v || 0); }

    function parentLabel(role){
      if(role === "father") return "אבא";
      if(role === "mother") return "אמא";
      if(role === "grandma") return "סבתא שמחה";
      return role;
    }

    function childLabel(id){

      if(id === "lavi") return "לביא";

    }

    function childEmoji(id){

    }

      if(action === "add") return "קיבל";

      if(action === "shop_approved") return "פרס אושר";
      if(action === "shop_rejected") return "פרס נדחה";
      return "עדכון";
    }


    function encouragementText(current, target, who){
      var percent = Math.round((current / Math.max(1, target)) * 100);
      if(current >= target) return "אלוף! הגעת ליעד של " + who + " 🎉";
      if(percent >= 90) return "וואו, אתה ממש רגע מהיעד של " + who + "! 🚀";
      if(percent >= 75) return "מדהים! עוד קצת ואתה מגיע ליעד של " + who + " ⭐";
      if(percent >= 50) return "חצי דרך כבר מאחוריך מול " + who + " 💪";
      if(percent >= 25) return "איזה יופי, אתה מתקדם נהדר מול " + who + " 🌟";
      return "התחלה מצוינת, ממשיכים לאסוף כוכבים מול " + who + " ✨";
    }

    function funnyWrongPassword(){
      var messages = [
        "אופס 😅 זאת לא הסיסמה שלך",
        "כמעט! נסה שוב 😜",
        "לא הפעם 🤭",
        "עוד ניסיון קטן ותצליח 💪",
        "זה לא זה, אבל אהבתי את הביטחון 😄"
      ];
      return messages[Math.floor(Math.random() * messages.length)];
    }

    function nowText(){
      return new Intl.DateTimeFormat("he-IL", { dateStyle:"short", timeStyle:"short" }).format(new Date());
    }

    function getAllowedRolesForChild(id){
      if(id === "itai" || id === "noya") return ["mother"];
      return ["father", "mother", "grandma"];
    }

    function getCurrentTotal(data, id){
      if(id === "itai" || id === "noya") return safeNumber(data.mother);
      return safeNumber(data.father) + safeNumber(data.mother) + safeNumber(data.grandma);
    }

    function getCurrentTargetTotal(data, id){
      if(id === "itai" || id === "noya") return safeNumber(data.targetMother) || 100;
      return (safeNumber(data.targetFather) || 100) + (safeNumber(data.targetMother) || 100) + (safeNumber(data.targetGrandma) || 100);
    }

    function calcOverallPercent(data, id){
      var total = getCurrentTotal(data, id);
      var target = getCurrentTargetTotal(data, id);
      return Math.min(100, Math.round((total / Math.max(1, target)) * 100));
    }

    function calcLevel(data, id){
      var percent = calcOverallPercent(data, id);
      if(percent < 25) return "מתחיל 🟢";
      if(percent < 50) return "מתקדם 🔵";
      if(percent < 75) return "אלוף 🟣";
      return "כוכב על 👑";
    }

    function buildLevelMessage(data, id){
      var percent = calcOverallPercent(data, id);
      var target = getCurrentTargetTotal(data, id);
      var total = getCurrentTotal(data, id);
      var left = Math.max(0, target - total);
      if(percent >= 90) return "וואו! אתה ממש רגע מדרגה הבאה 🚀";
      if(percent >= 75) return "עוד קצת ואתה כוכב על 👑";
      if(percent >= 50) return "אתה מתקדם מעולה 💪";
      if(percent >= 25) return "כל הכבוד, כבר התחלת לטפס 🌟";
      return left > 0 ? "יאללה, חסרים עוד " + left + " כוכבים ליעד הגדול ✨" : "בוא נתחיל לצבור כוכבים ✨";
    }

    function getParentColorClass(role){
      if(role === "father") return "f";
      if(role === "mother") return "m";
      return "g";
    }

    function getParentBarClass(role){
      if(role === "father") return "bar-f";
      if(role === "mother") return "bar-m";
      return "bar-g";
    }

    function getParentTipClass(role){
      if(role === "father") return "tip";
      if(role === "mother") return "tip mother";
      return "tip grandma";
    }

    async function ensureSettings(){
      var ref = db.collection("settings").doc("app");
      var snap = await ref.get();

      if(!snap.exists){
        PASSWORDS = {
          father: DEFAULT_PASSWORDS.father,
          mother: DEFAULT_PASSWORDS.mother,
          grandma: DEFAULT_PASSWORDS.grandma
        };
        CHILD_PASSWORDS = {
          meir: DEFAULT_CHILD_PASSWORDS.meir,
          lavi: DEFAULT_CHILD_PASSWORDS.lavi,
          itai: DEFAULT_CHILD_PASSWORDS.itai,
          noya: DEFAULT_CHILD_PASSWORDS.noya
        };
        APP_SETTINGS = {
          presetTasks: createEmptyPresetTasks(),
          sharedShop: []
        };

        await ref.set({
          passwords: PASSWORDS,
          childPasswords: CHILD_PASSWORDS,
          presetTasks: APP_SETTINGS.presetTasks,
          sharedShop: APP_SETTINGS.sharedShop
        });
      } else {
        var data = snap.data() || {};
        var savedPasswords = data.passwords || {};
        var savedChildPasswords = data.childPasswords || {};

        PASSWORDS = {
          father: savedPasswords.father || DEFAULT_PASSWORDS.father,
          mother: savedPasswords.mother || DEFAULT_PASSWORDS.mother,
          grandma: savedPasswords.grandma || DEFAULT_PASSWORDS.grandma
        };
        CHILD_PASSWORDS = {
          meir: savedChildPasswords.meir || DEFAULT_CHILD_PASSWORDS.meir,

    function buildGoalCard(title, current, target, reward, roleKey){
      var percent = Math.min(100, (current / Math.max(1, target)) * 100);
      var colorClass = roleKey === "total" ? "total" : getParentColorClass(roleKey);
      var barClass = roleKey === "total" ? "bar-total" : getParentBarClass(roleKey);
      var tipClass = roleKey === "total" ? "tip total" : getParentTipClass(roleKey);
      return `
        <div class="goal ${colorClass} ${percent >= 90 && current < target ? 'pulse-close' : ''}">
          <div class="big" style="font-size:22px">🎯 ${title}</div>
          <div><strong>${current}</strong> מתוך <strong>${target}</strong></div>
          <div class="progress"><div class="${barClass}" style="width:${percent}%"></div></div>
          <div class="small">נשארו עוד ${Math.max(0, target - current)} כוכבים</div>
          <div class="reward">🎁 ${reward || 'עדיין לא הוגדרה מתנה'}</div>
          ${current >= target ? `<div class="win">כל הכבוד! הגעת ליעד 🎉</div>` : `<div class="${tipClass}">${encouragementText(current, target, title)}</div>`}
        </div>

    function renderShopForChild(id, data){

      }

      var pendingShopRequests = (data && data.pendingShopRequests) || [];
      return APP_SETTINGS.sharedShop.map(function(item, index){
        var isPending = pendingShopRequests.some(function(req){
          return req.itemIndex === index && req.status === 'pending';
        });
        return `
          <div class="shop-line">
            <div><strong>${item.name}</strong> • ${item.price} כוכבים</div>
            ${isPending
              ? `<button class="shop mini secondary" disabled>ממתין לאישור ⏳</button>`
              : `<button class="shop mini" onclick="requestShopPurchase('${id}', ${index})">ממש</button>`}
          </div>
        `;
      }).join('');
    }

    function renderQuickTaskButtons(id, data){
      var roles = getAllowedRolesForChild(id);
      var pendingTasks = (data && data.pendingTasks) || [];
      var html = [];
      roles.forEach(function(role){
        var tasks = getPresetTasks(role, id);
        tasks.forEach(function(task, index){
          var isPending = pendingTasks.some(function(pt){
            return pt.role === role && pt.taskIndex === index && pt.status === 'pending';
          });
          if(isPending){
            html.push(`<button class="mini secondary" disabled>${task.name} • ממתין לבדיקה ⏳</button>`);
          } else {
            html.push(`<button class="mini ${role}" onclick="requestQuickTask('${id}', '${role}', ${index})">${task.name} +${task.stars}</button>`);
          }
        });
      });
      return html.length ? html.join('') : '<div class="small">אין משימות מוכנות עדיין לילד הזה</div>';
    }

    async function approvePendingShop(childId, requestId){
      var data = await getChildData(childId);
      data.pendingShopRequests = data.pendingShopRequests || [];
      var idx = data.pendingShopRequests.findIndex(function(req){ return req.id === requestId; });
      if(idx === -1) return;
      var req = data.pendingShopRequests[idx];
      if(req.status !== 'pending') return;

      if((childId === 'itai' || childId === 'noya') && user !== 'mother'){
        alert('לילדים האלה רק אמא יכולה לאשר מימוש פרס');
        return;
      }

      var total = getCurrentTotal(data, childId);
      if(total < safeNumber(req.price)){
        data.pendingShopRequests.splice(idx,1);
        var logsFail = data.logs || [];
        logsFail.unshift({
          parent: user,
          action: 'shop_rejected',
          amount: safeNumber(req.price),
          note: 'אין מספיק כוכבים לפרס: ' + req.itemName,
          createdAtText: nowText(),
          createdAtMillis: Date.now()
        });
        data.logs = logsFail.slice(0,100);
        await saveChildData(childId, data);
        alert('לא ניתן לאשר, אין מספיק כוכבים כרגע');
        parent(user);
        return;
      }

      var price = safeNumber(req.price);
      if(childId === "itai" || childId === "noya"){
        data.mother = Math.max(0, safeNumber(data.mother) - price);
      } else {
        var pools = [
          { key: 'father', value: safeNumber(data.father) },
          { key: 'mother', value: safeNumber(data.mother) },
          { key: 'grandma', value: safeNumber(data.grandma) }
        ];
        pools.sort(function(a,b){ return b.value - a.value; });
        var left = price;
        pools.forEach(function(pool){
          if(left <= 0) return;
          var take = Math.min(pool.value, left);
          data[pool.key] = Math.max(0, safeNumber(data[pool.key]) - take);
          left -= take;
        });
      }

      data.pendingShopRequests.splice(idx,1);
      var logs = data.logs || [];
      logs.unshift({
        parent: user,
        action: 'shop_approved',
        amount: price,
        note: 'אושר מימוש פרס: ' + req.itemName,
        createdAtText: nowText(),
        createdAtMillis: Date.now()
      });
      data.logs = logs.slice(0,100);
      await saveChildData(childId, data);
      alert('הפרס אושר והכוכבים עודכנו 🎉');
      parent(user);
    }

            <button onclick="redeem()">מימוש פרס</button>
          </div>

          ${renderPresetTasksEditor(role)}

          <div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#fff7ed);">
            <h3 style="margin-top:0">בקשות שמחכות לאישור</h3>
            <div id="pendingApprovals"><div class="small">טוען בקשות...</div></div>
          </div>

          ${renderShopEditor()}

          <div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#f5f9ff);">
            <h3 style="margin-top:0">שינוי סיסמת משתמש</h3>
            <input id="newPass" type="password" placeholder="סיסמה חדשה">
            <br>
            <button onclick="changePassword()">שמור סיסמה חדשה</button>
          </div>

          ${passwordsBlock}
          ${adminBlock}

          <button class="secondary" onclick="home()">חזרה</button>
        </div>
      `;

      loadParentSummary(role);
      loadPendingApprovals(role);
    }

    function togglePasswordsPanel(){
      var el = document.getElementById('passwordsPanel');
      if(!el) return;
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function changeSpecificPassword(roleKey, inputId){
      var el = document.getElementById(inputId);
      if(!el) return;
      var newPass = el.value;
      if(newPass === ""){
        alert("הסיסמה לא יכולה להיות ריקה");
        return;
      }
      PASSWORDS[roleKey] = newPass;
      await saveAppSettings();
      alert("הסיסמה נשמרה");
      parent(user);
    }

    async function changeSpecificChildPassword(childKey, inputId){
      var el = document.getElementById(inputId);
      if(!el) return;
      var newPass = el.value;
      if(newPass === ""){
        alert("הסיסמה לא יכולה להיות ריקה");
        return;
      }
      CHILD_PASSWORDS[childKey] = newPass;
      await saveAppSettings();
      alert("הסיסמה נשמרה");
      parent(user);
    }

    async function applyPresetTaskFromParent(role, taskIndex){
      var childId = getSelectedChild();
      var task = getPresetTasks(role, childId)[taskIndex];
      if(!task) return;
      var data = await getChildData(childId);
      if(role === 'father') data.father = safeNumber(data.father) + safeNumber(task.stars);
      if(role === 'mother') data.mother = safeNumber(data.mother) + safeNumber(task.stars);
      if(role === 'grandma') data.grandma = safeNumber(data.grandma) + safeNumber(task.stars);
      var logs = data.logs || [];
      logs.unshift({ parent: role, action: 'task_approved', amount: safeNumber(task.stars), note: task.name + ' (אישור ישיר מהורה)', createdAtText: nowText(), createdAtMillis: Date.now() });
      data.logs = logs.slice(0,100);
      await saveChildData(childId, data);
      alert('המשימה נוספה ישירות');
      parent(user);
    }

    async function addPresetTask(role){
      var name = document.getElementById('taskName').value.trim();
      var stars = Number(document.getElementById('taskStars').value);
      var childId = getSelectedChild();
      if(!name || !stars || stars < 1){
        alert('מלא שם משימה וכמות כוכבים תקינה');
        return;
      }
      APP_SETTINGS.presetTasks = normalizePresetTasks(APP_SETTINGS.presetTasks);
      APP_SETTINGS.presetTasks[childId][role] = APP_SETTINGS.presetTasks[childId][role] || [];
      if(APP_SETTINGS.presetTasks[childId][role].length >= 3){
        alert('אפשר לשמור עד 3 משימות מוכנות לילד הזה');
        return;
      }
      APP_SETTINGS.presetTasks[childId][role].push({ name: name, stars: stars });
      await saveAppSettings();
      alert('המשימה נשמרה עבור ' + childLabel(childId));
      parent(user);
    }

    async function removePresetTask(role, childId, index){
      APP_SETTINGS.presetTasks = normalizePresetTasks(APP_SETTINGS.presetTasks);
      APP_SETTINGS.presetTasks[childId][role].splice(index, 1);
      await saveAppSettings();
      parent(user);
    }

    async function addShopItem(){
      var name = document.getElementById('shopName').value.trim();
      var price = Number(document.getElementById('shopPrice').value);
      if(!name || !price || price < 1){
        alert('מלא שם פרס ומחיר תקין');
        return;
      }
      APP_SETTINGS.sharedShop.push({ name: name, price: price });
      await saveAppSettings();
      alert('הפרס נוסף לחנות');
      parent(user);
    }

    async function removeShopItem(index){
      APP_SETTINGS.sharedShop.splice(index, 1);
      await saveAppSettings();
      parent(user);
    }

    function getSelectedChild(){
      var selected = document.querySelector('input[name="childChoice"]:checked');
      if(selected) return selected.value;
      return SELECTED_PARENT_CHILD[user] || 'meir';
    }

    async function addStars(){ await change("add"); }
    async function removeStars(){ await change("remove"); }

    async function change(type){
      var child = getSelectedChild();
      var amount = Number(document.getElementById("amount").value);
      var note = document.getElementById("note").value || "";
      if(!amount || amount < 1){
        alert("הכנס כמות תקינה");
        return;
      }

      var data = await getChildData(child);
      if(user === "father"){
        if(child === "itai" || child === "noya"){
          alert("לילדים האלה רק אמא נותנת כוכבים");
          return;
        }
        data.father = type === "add" ? safeNumber(data.father) + amount : Math.max(0, safeNumber(data.father) - amount);
      } else if(user === "mother"){
        data.mother = type === "add" ? safeNumber(data.mother) + amount : Math.max(0, safeNumber(data.mother) - amount);
      } else if(user === "grandma"){
        if(child === "itai" || child === "noya"){
          alert("סבתא שמחה יכולה לתת כוכבים רק למאיר וללביא");
          return;
        }
        data.grandma = type === "add" ? safeNumber(data.grandma) + amount : Math.max(0, safeNumber(data.grandma) - amount);
      }

      var logs = data.logs || [];
      logs.unshift({ parent: user, action: type, amount: amount, note: note, createdAtText: nowText(), createdAtMillis: Date.now() });
      data.logs = logs.slice(0,100);
      await saveChildData(child, data);
      alert("עודכן");
      parent(user);
    }

    async function saveTarget(){
      var child = getSelectedChild();
      var target = Number(document.getElementById("target").value);
      var reward = document.getElementById("reward").value;
      if(!target || target < 1){
        alert("הכנס יעד תקין");
        return;
      }

      var data = await getChildData(child);
      if(user === "father"){
        if(child === "itai" || child === "noya"){
          alert("לילדים האלה רק אמא יש יעד ומתנה");
          return;
        }
        data.targetFather = target;
        data.rewardFather = reward;
      } else if(user === "mother"){
        data.targetMother = target;
        data.rewardMother = reward;
      } else if(user === "grandma"){
        if(child === "itai" || child === "noya"){
          alert("סבתא שמחה יכולה להגדיר יעד רק למאיר וללביא");
          return;
        }
        data.targetGrandma = target;
        data.rewardGrandma = reward;
      }

      var logs = data.logs || [];
      logs.unshift({ parent: user, action: "target", note: "יעד: " + target + " | מתנה: " + reward, createdAtText: nowText(), createdAtMillis: Date.now() });
      data.logs = logs.slice(0,100);
      await saveChildData(child, data);
      alert("נשמר");
      parent(user);
    }

    async function redeem(){
      var child = getSelectedChild();
      var data = await getChildData(child);
      if(user === "father"){
        if(child === "itai" || child === "noya"){
          alert("לילדים האלה רק אמא יכולה לממש פרס");
          return;
        }
        data.father = 0;
      } else if(user === "mother"){
        data.mother = 0;
      } else if(user === "grandma"){
        if(child === "itai" || child === "noya"){
          alert("סבתא שמחה יכולה לממש פרס רק למאיר וללביא");
          return;
        }
        data.grandma = 0;
      }

      var logs = data.logs || [];
      logs.unshift({ parent: user, action: "redeem", note: "בוצע מימוש פרס ואיפוס המסלול", createdAtText: nowText(), createdAtMillis: Date.now() });
      data.logs = logs.slice(0,100);
      await saveChildData(child, data);
      alert("הפרס מומש והמסלול אופס");
      parent(user);
    }

    async function changePassword(){
      var newPass = document.getElementById("newPass").value;
      if(newPass === ""){
        alert("הסיסמה לא יכולה להיות ריקה");
        return;
      }
      PASSWORDS[user] = newPass;
      await saveAppSettings();
      alert("הסיסמה נשמרה");
      parent(user);
    }

    function togglePasswordVisibility(inputId, checkboxEl){
      var input = document.getElementById(inputId);
      if(!input) return;
      input.type = checkboxEl && checkboxEl.checked ? "text" : "password";
    }

    async function changeOwnChildPassword(child){
      var newPass = document.getElementById("kidNewPass").value;
      if(newPass === ""){
        alert("הסיסמה לא יכולה להיות ריקה");
        return;
      }
      CHILD_PASSWORDS[child] = newPass;
      await saveAppSettings();
      alert("הסיסמה החדשה נשמרה");
      childLogin(child);
    }

    async function clearChildLogs(){
      var child = getSelectedChild();
      var ok = confirm("לנקות את כל הלוגים של " + childLabel(child) + "?");
      if(!ok) return;
      var data = await getChildData(child);
      data.logs = [];
      await saveChildData(child, data);
      alert("הלוגים של " + childLabel(child) + " נוקו");
      parent(user);
    }

    async function clearAllLogs(){
      var ok = confirm("לנקות את כל הלוגים של כל הילדים?");
      if(!ok) return;
      var children = ["meir","lavi","itai","noya"];
      for(var i = 0; i < children.length; i++){
        var childId = children[i];
        var data = await getChildData(childId);
        data.logs = [];
        await saveChildData(childId, data);
      }
      alert("כל הלוגים נוקו");
      parent(user);
    }


    async function resetAllTasksAndPending(){
      var ok = confirm("לאפס את כל המשימות המוכנות והמשימות שממתינות לבדיקה לכל הילדים?");
      if(!ok) return;

      APP_SETTINGS.presetTasks = createEmptyPresetTasks();
      await replacePresetTasksInDb(APP_SETTINGS.presetTasks);

      var children = ["meir","lavi","itai","noya"];
      for(var i = 0; i < children.length; i++){
        var childId = children[i];
        var data = await getChildData(childId);
        data.pendingTasks = [];
        var logs = data.logs || [];
        logs.unshift({
          parent: "father",
          action: "clearalllogs",
          note: "בוצע איפוס משימות ממתינות ומשימות מוכנות לכולם",
          createdAtText: nowText(),
          createdAtMillis: Date.now()
        });
        data.logs = logs.slice(0,100);
        await saveChildData(childId, data);
      }

      await saveAppSettings();

      alert("כל המשימות אופסו מהמסד נתונים");
      parent(user);
    }

    async function resetSharedShopAndPending(){
      var ok = confirm("לאפס את כל המתנות בחנות ואת כל בקשות המימוש שמחכות לאישור?");
      if(!ok) return;

      APP_SETTINGS.sharedShop = [];
      await saveAppSettings();

      var children = ["meir","lavi","itai","noya"];
      for(var i = 0; i < children.length; i++){
        var childId = children[i];
        var data = await getChildData(childId);
        data.pendingShopRequests = [];
        var logs = data.logs || [];
        logs.unshift({
          parent: "father",
          action: "clearalllogs",
          note: "בוצע איפוס חנות מתנות ובקשות מימוש לכולם",
          createdAtText: nowText(),
          createdAtMillis: Date.now()
        });
        data.logs = logs.slice(0,100);
        await saveChildData(childId, data);
      }

      alert("כל המתנות אופסו מהמסד נתונים");
      parent(user);
    }

    async function resetAll(){
      var ok = confirm("אתה בטוח שאתה רוצה לאפס את כל המערכת? זה יאפס כוכבים, יעדים, מתנות, לוגים וסיסמאות.");
      if(!ok) return;

      var children = ["meir","lavi","itai","noya"];
      for(var i = 0; i < children.length; i++){
        await db.collection("children").doc(children[i]).set({
          father: 0,
          mother: 0,
          grandma: 0,
          targetFather: 100,
          targetMother: 100,
          targetGrandma: 100,
          rewardFather: "",
          rewardMother: "",
          rewardGrandma: "",
          logs: [{ parent: user, action: "reset", note: "בוצע איפוס מלא למערכת", createdAtText: nowText(), createdAtMillis: Date.now() }]
        });
      }

      PASSWORDS = { father: DEFAULT_PASSWORDS.father, mother: DEFAULT_PASSWORDS.mother, grandma: DEFAULT_PASSWORDS.grandma };
      CHILD_PASSWORDS = { meir: DEFAULT_CHILD_PASSWORDS.meir, lavi: DEFAULT_CHILD_PASSWORDS.lavi, itai: DEFAULT_CHILD_PASSWORDS.itai, noya: DEFAULT_CHILD_PASSWORDS.noya };
      APP_SETTINGS = { presetTasks: createEmptyPresetTasks(), sharedShop: [] };
      await replacePresetTasksInDb(APP_SETTINGS.presetTasks);
      await saveAppSettings();
      alert("המערכת אופסה בהצלחה");
      home();
    }

    (async function start(){
      try {
        await ensureSettings();
        showSplash();
      } catch (e) {
        document.getElementById("app").innerHTML = `<div class="card">שגיאה: ${(e && e.message) ? e.message : e}</div>`;
      }
    })();
  </script></body>
  </html>
