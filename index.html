    .grid-buttons{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}

<script>

async function sha256Hex(str){
  var data = new TextEncoder().encode(str);
  var digest = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(digest)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
}

function showToast(msg){
  var el=document.getElementById('toastBox');
  if(!el) return;
  el.textContent=msg;
  el.style.display='block';
  clearTimeout(showToast._t);
  showToast._t=setTimeout(function(){ el.style.display='none'; }, 2200);
}
function appAlert(message, title){
  title = title || 'הודעה';
  var overlay=document.getElementById('modalOverlay');
  var t=document.getElementById('modalTitle');
  var m=document.getElementById('modalMessage');
  var a=document.getElementById('modalActions');
  if(!overlay||!t||!m||!a){ window.appAlert(message); return; }
  t.textContent=title;
  m.textContent=message;
  a.innerHTML='<button onclick="closeModal(true)">סגור</button>';
  overlay.classList.add('show');
}
function appConfirm(message, title){
  title = title || 'אישור פעולה';
  return new Promise(function(resolve){
    var overlay=document.getElementById('modalOverlay');
    var t=document.getElementById('modalTitle');
    var m=document.getElementById('modalMessage');
    var a=document.getElementById('modalActions');
    if(!overlay||!t||!m||!a){ resolve(window.confirm(message)); return; }
    t.textContent=title;
    m.textContent=message;
    window.__modalResolve=resolve;
    a.innerHTML='<button class="secondary" onclick="closeModal(false)">ביטול</button><button class="danger" onclick="closeModal(true)">אישור</button>';
    overlay.classList.add('show');
  });
}
function closeModal(result){
  var overlay=document.getElementById('modalOverlay');
  if(overlay) overlay.classList.remove('show');
  if(window.__modalResolve){ var r=window.__modalResolve; window.__modalResolve=null; r(result); }
}
function setSelectedChild(role, childId){
  SELECTED_PARENT_CHILD[role]=childId;
  if(user===role) parent(role);
}


function normalizeChildEntry(id, obj){
  obj = obj || {};
  var gender = obj.gender === 'girl' ? 'girl' : 'boy';
  return {
    name: obj.name || id,
    password: obj.password || '1234',
    gender: gender,
    emoji: obj.emoji || (gender === 'girl' ? '🦋' : '🦁'),
    color: obj.color || (gender === 'girl' ? '#ec4899' : '#3b82f6'),
    group: obj.group || 'main',
    customGroup: obj.customGroup || ''
  };
}
function normalizeParentEntry(id, obj){
  obj = obj || {};
  var defaults = {
    father: { emoji:'👨', color:'#3b82f6' },
    mother: { emoji:'👩', color:'#ec4899' },
    grandma: { emoji:'👵', color:'#8b5cf6' }
  };
  var d = defaults[id] || { emoji:'🧑', color:'#2563eb' };
  return {
    name: obj.name || id,
    password: obj.password || '',
    emoji: obj.emoji || d.emoji,
    color: obj.color || d.color,
    isMaster: !!obj.isMaster
  };
}
function childConfig(id){
  return normalizeChildEntry(id, APP_SETTINGS.childrenDirectory[id] || {});
}
function parentConfig(id){
  return normalizeParentEntry(id, APP_SETTINGS.parentsDirectory[id] || {});
}
function getMasterParentId(){
  return Object.keys(APP_SETTINGS.parentsDirectory).find(function(parentId){
    return !!(APP_SETTINGS.parentsDirectory[parentId] && APP_SETTINGS.parentsDirectory[parentId].isMaster);
  }) || '';
}
function isMasterParent(parentId){
  return !!(APP_SETTINGS.parentsDirectory[parentId] && APP_SETTINGS.parentsDirectory[parentId].isMaster);
}
function adminVersionTap(){
  ADMIN_TAP_COUNT++;
  if(ADMIN_TAP_TIMER) clearTimeout(ADMIN_TAP_TIMER);
  ADMIN_TAP_TIMER = setTimeout(function(){ ADMIN_TAP_COUNT = 0; }, 1800);
  if(ADMIN_TAP_COUNT >= 10){
    ADMIN_TAP_COUNT = 0;
    showAdminPassword();
  }
}

  document.getElementById("app").innerHTML = `<div class="card app-shimmer"><h2>ניהול מתקדם</h2><div class="small">הכנס סיסמת מאסטר או סיסמת אדמין פאנל</div><input id="adminPass" type="password" placeholder="סיסמת מפתח"><br><button onclick="checkAdminPassword()">כניסה לניהול</button><br><br><button class="secondary" onclick="home()">חזרה</button></div>`;
}

  var pass = document.getElementById("adminPass").value;
  var passHash = await sha256Hex(pass || "");
  var masterHash = ADMIN_SECURITY.masterPasswordHash || MASTER_PASSWORD_HASH;
  var adminHash = ADMIN_SECURITY.adminPanelPasswordHash || "";
  if(passHash !== masterHash && (!adminHash || passHash !== adminHash)){ appAlert(funnyWrongPassword()); return; }
  renderAdminPanel();
}

async function saveAdminSecurity(){
  await db.collection("settings").doc("app").set({
    adminSecurity: ADMIN_SECURITY
  }, { merge:true });
}

async function saveAdminPanelPassword(){
  var pass = (document.getElementById('adminPanelPassword')?.value || '').trim();
  if(!pass){
    appAlert('מלא סיסמה לאדמין פאנל');

  ADMIN_SECURITY.adminPanelPasswordHash = await sha256Hex(pass);

function createEmptyPresetTasks(){
  var out={};
  Object.keys(APP_SETTINGS.childrenDirectory || {}).forEach(function(childId){
    out[childId]={};
    Object.keys(APP_SETTINGS.parentsDirectory || {}).forEach(function(parentId){ out[childId][parentId]=[]; });
  });
  return out;
}
function normalizePresetTasks(raw){
  var out = createEmptyPresetTasks();
  if(!raw || typeof raw !== 'object') return out;
  Object.keys(out).forEach(function(childId){
    var childObj = raw[childId] || {};
    Object.keys(out[childId]).forEach(function(parentId){
      out[childId][parentId] = Array.isArray(childObj[parentId]) ? childObj[parentId].slice(0,3) : [];
    });
  });
  return out;
}

function migrateChildData(data){
  data = data || {};
  if(!data.scores) {
    data.scores = {};
    if('father' in data) data.scores.father = safeNumber(data.father);
    if('mother' in data) data.scores.mother = safeNumber(data.mother);
    if('grandma' in data) data.scores.grandma = safeNumber(data.grandma);
  }
  if(!data.targets) {
    data.targets = {};
    if('targetFather' in data) data.targets.father = safeNumber(data.targetFather)||100;
    if('targetMother' in data) data.targets.mother = safeNumber(data.targetMother)||100;
    if('targetGrandma' in data) data.targets.grandma = safeNumber(data.targetGrandma)||100;
  }
  if(!data.rewards) {
    data.rewards = {};
    if('rewardFather' in data) data.rewards.father = data.rewardFather || "";
    if('rewardMother' in data) data.rewards.mother = data.rewardMother || "";
    if('rewardGrandma' in data) data.rewards.grandma = data.rewardGrandma || "";
  }
  data.logs = data.logs || [];
  data.pendingTasks = data.pendingTasks || [];
  data.pendingShopRequests = data.pendingShopRequests || [];
  data.pendingCustomRequests = data.pendingCustomRequests || [];
  Object.keys(APP_SETTINGS.parentsDirectory).forEach(function(parentId){
    if(typeof data.scores[parentId] !== 'number') data.scores[parentId] = safeNumber(data.scores[parentId]);
    if(typeof data.targets[parentId] !== 'number' || !data.targets[parentId]) data.targets[parentId] = 100;
    if(typeof data.rewards[parentId] !== 'string') data.rewards[parentId] = '';
  });
  return data;
}
async function getChildData(id){
  var snap = await db.collection("children").doc(id).get();
  return migrateChildData(snap.data() || {});
}
async function saveChildData(id, data){
  data = migrateChildData(data);

function getCurrentTotal(data, id){
  return getAllowedParentsForChild(id).reduce(function(sum,parentId){ return sum + safeNumber(data.scores[parentId]); }, 0);
}
function getCurrentTargetTotal(data, id){
  return getAllowedParentsForChild(id).reduce(function(sum,parentId){ return sum + (safeNumber(data.targets[parentId]) || 100); }, 0);
}
function calcOverallPercent(data, id){
  var total = getCurrentTotal(data, id);
  var target = getCurrentTargetTotal(data, id);
  return Math.min(100, Math.round((total / Math.max(1, target)) * 100));
}
function calcLevel(data, id){
  var percent = calcOverallPercent(data, id);
  if(percent < 25) return "מתחיל 🟢";
  if(percent < 50) return "מתקדם 🔵";
  if(percent < 75) return "אלוף 🟣";
  return "כוכב על 👑";
}
function buildLevelMessage(data, id){
  var percent = calcOverallPercent(data, id);
  var target = getCurrentTargetTotal(data, id);
  var total = getCurrentTotal(data, id);
  var left = Math.max(0, target - total);
  if(percent >= 90) return "וואו! אתה ממש רגע מדרגה הבאה 🚀";
  if(percent >= 75) return "עוד קצת ואתה כוכב על 👑";
  if(percent >= 50) return "אתה מתקדם מעולה 💪";
  if(percent >= 25) return "כל הכבוד, כבר התחלת לטפס 🌟";
  return left > 0 ? "יאללה, חסרים עוד " + left + " כוכבים ליעד הגדול ✨" : "בוא נתחיל לצבור כוכבים ✨";
}

async function approvePendingShop(childId, requestId){
  var data = await getChildData(childId);
  var idx = (data.pendingShopRequests||[]).findIndex(req=>req.id===requestId);
  if(idx===-1) return;
  var req = data.pendingShopRequests[idx];
  if(!userCanManageChild(user, childId)){ appAlert('אין לך הרשאה לילד הזה'); return; }
  var price = safeNumber(req.price);
  var allowed = getAllowedParentsForChild(childId);
  var left = price;
  var pools = allowed.map(function(parentId){ return {key:parentId, value:safeNumber(data.scores[parentId])}; }).sort((a,b)=>b.value-a.value);
  pools.forEach(function(pool){ if(left<=0) return; var take = Math.min(pool.value,left); data.scores[pool.key] = Math.max(0,safeNumber(data.scores[pool.key])-take); left -= take; });
  data.pendingShopRequests.splice(idx,1);
  data.logs.unshift({ parent:user, action:'shop_approved', amount:price, note:'אושר מימוש פרס: '+req.itemName, createdAtText:nowText(), createdAtMillis:Date.now() });
  data.logs = data.logs.slice(0,100);
  await saveChildData(childId,data);
  appAlert('הפרס אושר 🎉');
  parent(user);
}

async function rejectPendingCustomGift(childId, requestId){
  var data = await getChildData(childId);
  var idx = (data.pendingCustomRequests||[]).findIndex(function(req){ return req.id===requestId; });
  if(idx===-1) return;
  var req = data.pendingCustomRequests[idx];
  if(!userCanManageChild(user, childId)){ appAlert('אין לך הרשאה לילד הזה'); return; }
  req.refusedBy = req.refusedBy || [];
  if(req.refusedBy.indexOf(user) === -1) req.refusedBy.push(user);
  var allowedParents = getAllowedParentsForChild(childId);
  var allRefused = allowedParents.every(function(parentId){ return req.refusedBy.indexOf(parentId) !== -1; });
  if(allRefused){
    data.pendingCustomRequests.splice(idx,1);
    data.logs.unshift({ parent:user, action:'custom_request_rejected', amount:safeNumber(req.price), note:'נדחתה בקשה אישית: ' + req.itemName + ' | סירבו: ' + req.refusedBy.map(function(parentId){ return parentLabel(parentId); }).join(', '), createdAtText:nowText(), createdAtMillis:Date.now() });
  } else {
    data.pendingCustomRequests[idx] = req;
    data.logs.unshift({ parent:user, action:'custom_request_rejected', amount:safeNumber(req.price), note:'סירב לבקשה אישית: ' + req.itemName, createdAtText:nowText(), createdAtMillis:Date.now() });
  }
  data.logs = data.logs.slice(0,100);
  await saveChildData(childId,data);
  appAlert(allRefused ? 'כל ההורים סירבו לבקשה' : 'הסירוב נשמר, מחכים לשאר ההורים');
  parent(user);
}

  if(!SELECTED_PARENT_CHILD[role] || !ids.includes(SELECTED_PARENT_CHILD[role])) SELECTED_PARENT_CHILD[role] = ids[0];
  var childRadioOptions = ids.map(function(childId){ return `<label style="display:inline-flex;align-items:center;gap:8px;margin:6px 10px;"><input type="radio" name="childChoice" value="${childId}" ${SELECTED_PARENT_CHILD[role]===childId?'checked':''} onchange="setSelectedChild('${role}','${childId}')"> ${childLabel(childId)}</label>`; }).join('');
  document.getElementById("app").innerHTML = `<div class="card app-shimmer" style="max-width:980px;"><h2>${parentConfig(role).emoji} ${parentLabel(role)}</h2><div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#f8fafc);"><div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;"><h3 style="margin:0">כמה כוכבים יש לכל ילד</h3><button onclick="parent(user)">רענן 🔄</button></div><div id="parentSummary" class="row three"><div class="small">טוען נתונים...</div></div></div><div class="card" style="background:#fafafa; margin-top:0;"><h3 style="margin-top:0">בחר ילד</h3><div>${childRadioOptions}</div></div><div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#f8fbff);"><h3 style="margin-top:0">ניהול כוכבים</h3><input id="amount" type="number" value="1" placeholder="כמות כוכבים" style="width:90%;"><input id="note" placeholder="על מה הכוכבים או ההורדה" style="width:90%;"><br><button onclick="addStars()">הוסף</button><button onclick="removeStars()">הסר</button></div><div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#fff8fb);"><h3 style="margin-top:0">הגדרת יעד ופרס</h3><input id="target" type="number" placeholder="יעד" style="width:90%;"><input id="reward" placeholder="מתנה" style="width:90%;"><br><button onclick="saveTarget()">שמור יעד</button><button onclick="redeem()">מימוש פרס</button></div>${renderPresetTasksEditor(role)}<div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#fff7ed);"><h3 style="margin-top:0">בקשות שמחכות לאישור</h3><div id="pendingApprovals"><div class="small">טוען בקשות...</div></div></div>${renderShopEditor()}<div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#f5f9ff);"><h3 style="margin-top:0">שינוי סיסמת משתמש</h3><input id="newPass" type="password" placeholder="סיסמה חדשה"><br><button onclick="changePassword()">שמור סיסמה חדשה</button></div>${renderMasterPasswordsManager()}<button class="secondary" onclick="home()">חזרה</button></div>`;
  loadParentSummary(role); loadPendingApprovals(role);
}
async function addPresetTask(role){
  var name=document.getElementById('taskName').value.trim();
  var stars=Number(document.getElementById('taskStars').value);
  var childId=getSelectedChild();
  if(!name || !stars || stars<1){ appAlert('מלא שם משימה וכמות כוכבים תקינה'); return; }
  APP_SETTINGS.presetTasks[childId][role]=APP_SETTINGS.presetTasks[childId][role]||[];
  if(APP_SETTINGS.presetTasks[childId][role].length>=3){ appAlert('אפשר לשמור עד 3 משימות מוכנות לילד הזה'); return; }
  APP_SETTINGS.presetTasks[childId][role].push({name:name, stars:stars});
  await saveAppSettings(); appAlert('המשימה נשמרה עבור ' + childLabel(childId)); parent(user);
}
async function removePresetTask(role, childId, index){ APP_SETTINGS.presetTasks[childId][role].splice(index,1); await saveAppSettings(); parent(user); }
async function addShopItem(){ var name=document.getElementById('shopName').value.trim(); var price=Number(document.getElementById('shopPrice').value); if(!name||!price||price<1){appAlert('מלא שם פרס ומחיר תקין');return;} APP_SETTINGS.sharedShop.push({name:name, price:price}); await saveAppSettings(); appAlert('הפרס נוסף לחנות'); parent(user); }
async function removeShopItem(index){ APP_SETTINGS.sharedShop.splice(index,1); await saveAppSettings(); parent(user); }
function getSelectedChild(){ return SELECTED_PARENT_CHILD[user] || Object.keys(APP_SETTINGS.childrenDirectory)[0]; }
async function addStars(){ await change('add'); }
async function removeStars(){ await change('remove'); }
async function change(type){
  var child=getSelectedChild(); var amount=Number(document.getElementById('amount').value); var note=document.getElementById('note').value || '';
  if(!amount || amount<1){ appAlert('הכנס כמות תקינה'); return; }
  var data=await getChildData(child);
  data.scores[user] = type==='add' ? safeNumber(data.scores[user])+amount : Math.max(0, safeNumber(data.scores[user])-amount);
  data.logs.unshift({parent:user, action:type, amount:amount, note:note, createdAtText:nowText(), createdAtMillis:Date.now()});
  data.logs = data.logs.slice(0,100);
  await saveChildData(child,data); appAlert('עודכן'); parent(user);
}
async function saveTarget(){
  var child=getSelectedChild(); var target=Number(document.getElementById('target').value); var reward=document.getElementById('reward').value;
  if(!target || target<1){ appAlert('הכנס יעד תקין'); return; }
  var data=await getChildData(child); data.targets[user]=target; data.rewards[user]=reward;
  data.logs.unshift({parent:user, action:'target', note:'יעד: '+target+' | מתנה: '+reward, createdAtText:nowText(), createdAtMillis:Date.now() });
  data.logs = data.logs.slice(0,100);
  await saveChildData(child,data); appAlert('נשמר'); parent(user);
}
async function redeem(){
  var child=getSelectedChild(); var data=await getChildData(child); data.scores[user]=0;
  data.logs.unshift({parent:user, action:'redeem', note:'בוצע מימוש פרס ואיפוס המסלול', createdAtText:nowText(), createdAtMillis:Date.now()});
  data.logs = data.logs.slice(0,100);
  await saveChildData(child,data); appAlert('הפרס מומש והמסלול אופס'); parent(user);
}
async function changePassword(){ var newPass=document.getElementById('newPass').value; if(newPass===''){appAlert('הסיסמה לא יכולה להיות ריקה'); return;} PASSWORDS[user]=newPass; APP_SETTINGS.parentsDirectory[user].password=newPass; await saveAppSettings(); appAlert('הסיסמה נשמרה'); parent(user); }

async function saveChildAppearance(child){
  var newEmoji = (document.getElementById('kidNewEmoji')?.value || '').trim();
  var newColor = document.getElementById('kidNewColor')?.value || '';
  if(!APP_SETTINGS.childrenDirectory[child]) return;
  if(newEmoji) APP_SETTINGS.childrenDirectory[child].emoji = newEmoji;
  if(newColor) APP_SETTINGS.childrenDirectory[child].color = newColor;
  await saveAppSettings();
  appAlert('העיצוב החדש נשמר ✨');
  childLogin(child);
}

async function changeOwnChildPassword(child){ var newPass=document.getElementById('kidNewPass').value; if(newPass===''){appAlert('הסיסמה לא יכולה להיות ריקה'); return;} CHILD_PASSWORDS[child]=newPass; APP_SETTINGS.childrenDirectory[child].password=newPass; await saveAppSettings(); appAlert('הסיסמה החדשה נשמרה'); childLogin(child); }
function togglePasswordVisibility(inputId, checkboxEl){ var input=document.getElementById(inputId); if(!input) return; input.type = checkboxEl && checkboxEl.checked ? 'text' : 'password'; }
(async function start(){ try { await ensureSettings(); if(ADMIN_BOOTSTRAP_MODE){ renderAdminPanel(); } else { showSplash(); } } catch(e) { document.getElementById('app').innerHTML=`<div class="card">שגיאה: ${ (e && e.message) ? e.message : e }</div>`; } })();
</script>
</body>
</html>
