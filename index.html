<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כוכבים</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff7ed, #ffe4e6);
      margin: 0;
      text-align: center;
      padding: 10px;
      color: #1f2937;
    }
    .card {
      background: rgba(255,255,255,.92);
      padding: 18px;
      border-radius: 24px;
      margin: 10px auto;
      box-shadow: 0 14px 34px rgba(0,0,0,.09);
      max-width: 980px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.7);
    }
    button {
      padding: 12px 14px;
      border: none;
      border-radius: 14px;
      margin: 5px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      font-size: 16px;
      box-shadow: 0 8px 18px rgba(37,99,235,.20);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(37,99,235,.24);
    }
    button:active { transform: scale(.98); }
    button.secondary {
      background: #fff;
      color: #1f2937;
      border: 1px solid #e5e7eb;
      box-shadow: none;
    }
    button.father { background: #3b82f6; }
    button.mother { background: #ec4899; }
    button.grandma { background: #8b5cf6; }
    button.danger { background: #dc2626; }
    button.shop { background: #059669; }
    button.mini {
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 10px;
    }

    input, select {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      margin: 5px;
      font-size: 16px;
      width: min(320px, 92%);
      box-sizing: border-box;
      background: #fff;
    }

    .progress {
      height: 14px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 10px;
    }
    .bar-f { height: 100%; background: linear-gradient(90deg, #60a5fa, #2563eb); }
    .bar-m { height: 100%; background: linear-gradient(90deg, #f472b6, #db2777); }
    .bar-g { height: 100%; background: linear-gradient(90deg, #a78bfa, #7c3aed); }
    .bar-total { height: 100%; background: linear-gradient(90deg, #f59e0b, #ef4444); }

    .big { font-size: 28px; font-weight: bold; }
    .small { font-size: 13px; color: #666; }
    .hero { max-width: 860px; margin: 0 auto 14px; }

    .badge {
      width: 90px;
      height: 90px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fde68a, #fb7185);
      display: grid;
      place-items: center;
      font-size: 44px;
      margin: 10px auto 12px;
      box-shadow: 0 12px 24px rgba(0,0,0,.10);
    }

    .welcome-stage {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg,#fffaf0,#ffe4e6);
      border: 2px dashed #f9a8d4;
    }
    .welcome-title {
      font-size: 34px;
      font-weight: 900;
      color: #be185d;
      margin: 8px 0;
      animation: popIn .6s ease;
    }
    .welcome-sub {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 10px;
    }
    .floating-icons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .floating-icons span {
      font-size: 28px;
      animation: floaty 2.2s ease-in-out infinite;
    }
    .floating-icons span:nth-child(2){ animation-delay:.15s; }
    .floating-icons span:nth-child(3){ animation-delay:.3s; }
    .floating-icons span:nth-child(4){ animation-delay:.45s; }
    .floating-icons span:nth-child(5){ animation-delay:.6s; }
    .welcome-pill {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.85);
      box-shadow: 0 8px 18px rgba(251,113,133,.12);
      font-weight: bold;
      margin-top: 8px;
    }

    .kid-card {
      max-width: 860px;
      margin: 0 auto;
      background: linear-gradient(180deg, #ffffff, #fff7ed);
    }
    .kid-title { font-size: 34px; font-weight: 900; margin: 0; }
    .kid-sub { color: #6b7280; margin: 8px 0 0; }

    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 14px;
    }
    .row.three {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      overflow: visible;
      padding-bottom: 0;
    }
    .stat {
      border-radius: 22px;
      padding: 18px 16px;
      min-width: 0;
      box-shadow: 0 10px 24px rgba(0,0,0,.06);
      border: 1px solid rgba(255,255,255,.75);
      position: relative;
      overflow: hidden;
    }
    .stat .big {
      font-size: 38px;
      line-height: 1;
      margin-top: 8px;
    }
    .stat-label {
      font-size: 16px;
      font-weight: bold;
    }
    .stat-sub {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }
    .stats-total-top {
      margin-top: 14px;
      background: linear-gradient(135deg,#fff7ed,#fecdd3);
      border: 2px solid #fde68a;
      box-shadow: 0 16px 32px rgba(251,146,60,.16);
    }
    .stats-grid-parents {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    .stat.f { background: linear-gradient(135deg, #eff6ff, #dbeafe); }
    .stat.m { background: linear-gradient(135deg, #fdf2f8, #fce7f3); }
    .stat.g { background: linear-gradient(135deg, #f5f3ff, #ede9fe); }
    .stat.total { background: linear-gradient(135deg, #fff7ed, #ffedd5); }

    .summary-card {
      background: linear-gradient(180deg,#ffffff,#faf5ff);
      border-radius: 22px;
      padding: 14px;
      text-align: center;
      border: 1px solid #ede9fe;
      box-shadow: 0 10px 22px rgba(124,58,237,.10);
      position: relative;
      overflow: hidden;
      min-width: 300px;
      max-width: 300px;
      flex: 0 0 300px;
      scroll-snap-align: start;
    }
    .summary-card:after {
      content: "";
      position: absolute;
      top: 0;
      right: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
      transform: skewX(-20deg);
      animation: appShine 5.5s ease-in-out infinite;
          pointer-events: none;
    }

    .logs-box {
      margin-top: 10px;
      max-height: 220px;
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 8px;
      background: linear-gradient(180deg,#ffffff,#f8fafc);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.03);
      text-align: right;
    }
    .summary-scroll-hint {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }
    .logs-title {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
      color: #4b5563;
    }

    .goal {
      border-radius: 20px;
      padding: 16px;
      margin-top: 12px;
      text-align: right;
    }
    .goal.f { background: linear-gradient(135deg, #eff6ff, #bfdbfe); }
    .goal.m { background: linear-gradient(135deg, #fdf2f8, #fbcfe8); }
    .goal.g { background: linear-gradient(135deg, #f5f3ff, #ddd6fe); }
    .goal.total { background: linear-gradient(135deg, #fff7ed, #fed7aa); }

    .reward {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.7);
      font-weight: bold;
    }
    .win {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #dcfce7;
      color: #166534;
      font-weight: bold;
    }
    .tip {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: bold;
    }
    .tip.mother { background: #fdf2f8; color: #be185d; }
    .tip.grandma { background: #f5f3ff; color: #6d28d9; }
    .tip.total { background: #fff7ed; color: #b45309; }

    .actions { margin-top: 14px; }
    hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 18px 0;
    }

    .log-item {
      background: #f9fafb;
      border-radius: 14px;
      padding: 10px;
      margin: 8px 0;
      text-align: right;
      border: 1px solid #eef2f7;
    }

    .app-shimmer {
      position: relative;
      overflow: hidden;
    }
    .app-shimmer:after {
      content: "";
      position: absolute;
      top: 0;
      right: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
      transform: skewX(-20deg);
      animation: appShine 4.5s ease-in-out infinite;
          pointer-events: none;
    }

    .floaty { animation: floaty 2.6s ease-in-out infinite; }
    .pulse-close { animation: pulseClose 1.2s ease-in-out infinite; }
    .star-burst { position: relative; overflow: hidden; }
    .star-celebration {
      position: relative;
      margin: 12px 0 4px;
      padding: 12px 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
      font-weight: bold;
      box-shadow: 0 10px 24px rgba(245,158,11,.20);
      animation: popIn .55s ease;
    }
    .star-rain {
      pointer-events: none;
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .star-rain span {
      position: absolute;
      top: -10px;
      font-size: 22px;
      animation: starFall 1.8s linear forwards;
      opacity: .95;
    }
    .pop-number { animation: numberPulse 1.1s ease-in-out 2; }
    .shine-card { position: relative; overflow: hidden; }
    .shine-card:after {
      content: "";
      position: absolute;
      top: 0;
      right: -120%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent);
      transform: skewX(-20deg);
      animation: shineMove 2.4s ease-in-out infinite;
          pointer-events: none;
    }

    .task-line, .shop-line {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0;
      flex-wrap: wrap;
      padding: 10px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid #ececec;
    }
    .task-btn-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }
    .level-chip {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg,#fde68a,#fca5a5);
      font-weight: bold;
      margin-top: 8px;
    }

    @keyframes floaty {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes pulseClose {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes popIn {
      0% { transform: scale(.85); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes starFall {
      0% { transform: translateY(0) rotate(0deg) scale(.7); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(220px) rotate(180deg) scale(1.15); opacity: 0; }
    }
    @keyframes numberPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes shineMove {
      0% { right: -120%; }
      100% { right: 160%; }
    }
    @keyframes appShine {
      0% { right: -120%; }
      100% { right: 180%; }
    }
    @keyframes spinStar {
      0% { transform: rotate(0deg) scale(0.9); }
      50% { transform: rotate(180deg) scale(1.08); }
      100% { transform: rotate(360deg) scale(0.9); }
    }
    @keyframes fadeRise {
      0% { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes lionBounce {
      0%,100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-14px) rotate(-8deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-10px) rotate(8deg); }
    }
    @keyframes giftPulse {
      0%,100% { transform: scale(1) rotate(0deg); }
      35% { transform: scale(1.08) rotate(-6deg); }
      70% { transform: scale(0.96) rotate(6deg); }
    }

    
    .grid-buttons{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
    .pending-box{margin-top:12px;padding:12px;border-radius:18px;background:linear-gradient(180deg,#ffffff,#fff7ed);border:2px dashed #fdba74}

    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .kid-title { font-size: 28px; }
      .task-line, .shop-line { justify-content: center; }
      .stat .big { font-size: 34px; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyDRz4mbNreCeDa6VWRDPbvGND0zWRcB1U4",
  authDomain: "family-stars-app.firebaseapp.com",
  projectId: "family-stars-app"
});
var db = firebase.firestore();

var APP_VERSION = "2.4.1";
var ADMIN_TAP_COUNT = 0;
var ADMIN_TAP_TIMER = null;
var MASTER_PASSWORD = "plsM@L8088";
var user = null;
var APP_SETTINGS = {
  parentsDirectory: {},
  childrenDirectory: {},
  permissionsMatrix: {},
  presetTasks: {},
  sharedShop: []
};
var PASSWORDS = {};
var CHILD_PASSWORDS = {};
var SELECTED_PARENT_CHILD = {};

function normalizeChildEntry(id, obj){
  obj = obj || {};
  var gender = obj.gender === 'girl' ? 'girl' : 'boy';
  return {
    name: obj.name || id,
    password: obj.password || '1234',
    gender: gender,
    emoji: obj.emoji || (gender === 'girl' ? '🦋' : '🦁'),
    color: obj.color || (gender === 'girl' ? '#ec4899' : '#3b82f6'),
    group: obj.group || 'main',
    customGroup: obj.customGroup || ''
  };
}
function childConfig(id){
  return normalizeChildEntry(id, APP_SETTINGS.childrenDirectory[id] || {});
}
function adminVersionTap(){
  ADMIN_TAP_COUNT++;
  if(ADMIN_TAP_TIMER) clearTimeout(ADMIN_TAP_TIMER);
  ADMIN_TAP_TIMER = setTimeout(function(){ ADMIN_TAP_COUNT = 0; }, 1800);
  if(ADMIN_TAP_COUNT >= 10){
    ADMIN_TAP_COUNT = 0;
    showAdminPassword();
  }
}
function showAdminPassword(){
  document.getElementById("app").innerHTML = `<div class="card app-shimmer"><h2>ניהול מתקדם</h2><div class="small">הכנס את סיסמת המפתח</div><input id="adminPass" type="password" placeholder="סיסמת מפתח"><br><button onclick="checkAdminPassword()">כניסה לניהול</button><br><br><button class="secondary" onclick="home()">חזרה</button></div>`;
}
function checkAdminPassword(){
  var pass = document.getElementById("adminPass").value;
  if(pass !== MASTER_PASSWORD){ alert(funnyWrongPassword()); return; }
  renderAdminPanel();
}
async function ensureChildDocExists(childId){
  var snap = await db.collection("children").doc(childId).get();
  if(!snap.exists){
    await db.collection("children").doc(childId).set({
      scores:{}, targets:{}, rewards:{}, logs:[], pendingTasks:[], pendingShopRequests:[]
    }, {merge:true});
  }
}
function groupedChildrenForHome(){
  var groups = { main: [], more: [], custom: {} };
  Object.keys(APP_SETTINGS.childrenDirectory).forEach(function(childId){
    var c = childConfig(childId);
    var buttonHtml = `<button onclick="childLogin('${childId}')" style="background:${c.color}">${c.emoji} ${c.name}</button>`;
    if(c.group === 'main') groups.main.push(buttonHtml);
    else if(c.group === 'more') groups.more.push(buttonHtml);
    else {
      var g = c.customGroup || 'עוד';
      if(!groups.custom[g]) groups.custom[g] = [];
      groups.custom[g].push(buttonHtml);
    }
  });
  return groups;
}
async function addAdminChild(){
  var name = document.getElementById('adminChildName').value.trim();
  var key = (document.getElementById('adminChildKey').value || '').trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\-]/g,'');
  var password = document.getElementById('adminChildPassword').value.trim() || '1234';
  var gender = document.getElementById('adminChildGender').value;
  var emoji = document.getElementById('adminChildEmoji').value.trim() || (gender === 'girl' ? '🦋' : '🦁');
  var color = document.getElementById('adminChildColor').value || (gender === 'girl' ? '#ec4899' : '#3b82f6');
  var group = document.getElementById('adminChildGroup').value;
  var customGroup = document.getElementById('adminChildCustomGroup').value.trim();
  if(!name || !key){ alert('מלא שם ומזהה לילד'); return; }
  APP_SETTINGS.childrenDirectory[key] = { name:name, password:password, gender:gender, emoji:emoji, color:color, group:group, customGroup:customGroup };
  CHILD_PASSWORDS[key] = password;
  if(!APP_SETTINGS.permissionsMatrix[key]) APP_SETTINGS.permissionsMatrix[key] = {};
  Object.keys(APP_SETTINGS.parentsDirectory).forEach(function(parentId){
    if(typeof APP_SETTINGS.permissionsMatrix[key][parentId] !== 'boolean'){
      APP_SETTINGS.permissionsMatrix[key][parentId] = false;
    }
  });
  if(!APP_SETTINGS.presetTasks[key]) APP_SETTINGS.presetTasks[key] = {};
  Object.keys(APP_SETTINGS.parentsDirectory).forEach(function(parentId){
    if(!Array.isArray(APP_SETTINGS.presetTasks[key][parentId])) APP_SETTINGS.presetTasks[key][parentId] = [];
  });
  await ensureChildDocExists(key);
  await saveAppSettings();
  renderAdminPanel();
}
async function updateAdminChildField(id, field, value){
  if(!APP_SETTINGS.childrenDirectory[id]) return;
  APP_SETTINGS.childrenDirectory[id][field] = value;
  if(field === 'gender'){
    if(value === 'girl'){
      if(!APP_SETTINGS.childrenDirectory[id].emoji || APP_SETTINGS.childrenDirectory[id].emoji === '🦁') APP_SETTINGS.childrenDirectory[id].emoji = '🦋';
      if(!APP_SETTINGS.childrenDirectory[id].color || APP_SETTINGS.childrenDirectory[id].color === '#3b82f6') APP_SETTINGS.childrenDirectory[id].color = '#ec4899';
    } else {
      if(!APP_SETTINGS.childrenDirectory[id].emoji || APP_SETTINGS.childrenDirectory[id].emoji === '🦋') APP_SETTINGS.childrenDirectory[id].emoji = '🦁';
      if(!APP_SETTINGS.childrenDirectory[id].color || APP_SETTINGS.childrenDirectory[id].color === '#ec4899') APP_SETTINGS.childrenDirectory[id].color = '#3b82f6';
    }
  }
  if(field === 'password') CHILD_PASSWORDS[id] = value;
  await saveAppSettings();
  renderAdminPanel();
}
async function deleteAdminChild(id){
  var ok = confirm('למחוק את הילד הזה ממערכת הניהול?');
  if(!ok) return;
  delete APP_SETTINGS.childrenDirectory[id];
  delete APP_SETTINGS.permissionsMatrix[id];
  delete APP_SETTINGS.presetTasks[id];
  delete CHILD_PASSWORDS[id];
  await saveAppSettings();
  renderAdminPanel();
}
function toggleAdminPermission(childId, parentId, checked){
  APP_SETTINGS.permissionsMatrix[childId] = APP_SETTINGS.permissionsMatrix[childId] || {};
  APP_SETTINGS.permissionsMatrix[childId][parentId] = checked;
}
async function saveAdminPermissions(){
  await saveAppSettings();
  alert('ההרשאות נשמרו');
  renderAdminPanel();
}
function groupLabelFromConfig(c){
  if(c.group === 'custom') return c.customGroup || 'קבוצה מותאמת';
  if(c.group === 'more') return 'עוד ילדים';
  return 'ראשי';
}
function renderAdminChildrenEditorHtml(){
  var ids = Object.keys(APP_SETTINGS.childrenDirectory);
  if(!ids.length) return '<div class="small">אין ילדים במערכת</div>';
  return ids.map(function(childId){
    var c = childConfig(childId);
    return `<div class="summary-card" style="min-width:unset;max-width:none;flex:none;margin-bottom:12px;text-align:right">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <div><strong>${c.emoji} ${c.name}</strong> <span class="small">(${childId})</span></div>
        <button class="danger mini" onclick="deleteAdminChild('${childId}')">מחק ילד</button>
      </div>
      <input value="${c.name.replace(/"/g,'&quot;')}" onchange="updateAdminChildField('${childId}','name',this.value)" placeholder="שם הילד">
      <input value="${(c.password||'').replace(/"/g,'&quot;')}" onchange="updateAdminChildField('${childId}','password',this.value)" placeholder="סיסמה">
      <select onchange="updateAdminChildField('${childId}','gender',this.value)">
        <option value="boy" ${c.gender==='boy'?'selected':''}>ילד</option>
        <option value="girl" ${c.gender==='girl'?'selected':''}>ילדה</option>
      </select>
      <input value="${(c.emoji||'').replace(/"/g,'&quot;')}" onchange="updateAdminChildField('${childId}','emoji',this.value)" placeholder="אייקון">
      <input type="color" value="${c.color || '#3b82f6'}" onchange="updateAdminChildField('${childId}','color',this.value)">
      <select onchange="updateAdminChildField('${childId}','group',this.value)">
        <option value="main" ${c.group==='main'?'selected':''}>קבוצה ראשית</option>
        <option value="more" ${c.group==='more'?'selected':''}>עוד ילדים</option>
        <option value="custom" ${c.group==='custom'?'selected':''}>קבוצה מותאמת</option>
      </select>
      <input value="${(c.customGroup||'').replace(/"/g,'&quot;')}" onchange="updateAdminChildField('${childId}','customGroup',this.value)" placeholder="שם קבוצה מותאמת">

function createEmptyPresetTasks(){
  var out={};
  Object.keys(APP_SETTINGS.childrenDirectory || {}).forEach(function(childId){
    out[childId]={};
    Object.keys(APP_SETTINGS.parentsDirectory || {}).forEach(function(parentId){ out[childId][parentId]=[]; });
  });
  return out;
}
function normalizePresetTasks(raw){
  var out = createEmptyPresetTasks();
  if(!raw || typeof raw !== 'object') return out;
  Object.keys(out).forEach(function(childId){
    var childObj = raw[childId] || {};
    Object.keys(out[childId]).forEach(function(parentId){
      out[childId][parentId] = Array.isArray(childObj[parentId]) ? childObj[parentId].slice(0,3) : [];
    });
  });
  return out;
}
function getAllowedParentsForChild(childId){
  var perms = APP_SETTINGS.permissionsMatrix[childId] || {};
  return Object.keys(APP_SETTINGS.parentsDirectory).filter(function(parentId){ return !!perms[parentId]; });
}
function userCanManageChild(parentId, childId){
  return !!(APP_SETTINGS.permissionsMatrix[childId] && APP_SETTINGS.permissionsMatrix[childId][parentId]);
}
function defaultPermissions(parents, children){
  var p={};
  Object.keys(children).forEach(function(childId){
    p[childId]={};
    Object.keys(parents).forEach(function(parentId){
      var allow = (childId==='itai'||childId==='noya') ? parentId==='mother' : true;
      p[childId][parentId]=allow;
    });
  });
  return p;
}

function migrateChildData(data){
  data = data || {};
  if(!data.scores) {
    data.scores = {};
    if('father' in data) data.scores.father = safeNumber(data.father);
    if('mother' in data) data.scores.mother = safeNumber(data.mother);
    if('grandma' in data) data.scores.grandma = safeNumber(data.grandma);
  }
  if(!data.targets) {
    data.targets = {};
    if('targetFather' in data) data.targets.father = safeNumber(data.targetFather)||100;
    if('targetMother' in data) data.targets.mother = safeNumber(data.targetMother)||100;
    if('targetGrandma' in data) data.targets.grandma = safeNumber(data.targetGrandma)||100;
  }
  if(!data.rewards) {
    data.rewards = {};
    if('rewardFather' in data) data.rewards.father = data.rewardFather || "";
    if('rewardMother' in data) data.rewards.mother = data.rewardMother || "";
    if('rewardGrandma' in data) data.rewards.grandma = data.rewardGrandma || "";
  }
  data.logs = data.logs || [];
  data.pendingTasks = data.pendingTasks || [];
  data.pendingShopRequests = data.pendingShopRequests || [];
  Object.keys(APP_SETTINGS.parentsDirectory).forEach(function(parentId){
    if(typeof data.scores[parentId] !== 'number') data.scores[parentId] = safeNumber(data.scores[parentId]);
    if(typeof data.targets[parentId] !== 'number' || !data.targets[parentId]) data.targets[parentId] = 100;
    if(typeof data.rewards[parentId] !== 'string') data.rewards[parentId] = '';
  });
  return data;
}
async function getChildData(id){
  var snap = await db.collection("children").doc(id).get();
  return migrateChildData(snap.data() || {});
}
async function saveChildData(id, data){
  data = migrateChildData(data);
  await db.collection("children").doc(id).set(data, { merge:true });
}
function getCurrentTotal(data, id){
  return getAllowedParentsForChild(id).reduce(function(sum,parentId){ return sum + safeNumber(data.scores[parentId]); }, 0);
}
function getCurrentTargetTotal(data, id){
  return getAllowedParentsForChild(id).reduce(function(sum,parentId){ return sum + (safeNumber(data.targets[parentId]) || 100); }, 0);
}
function calcOverallPercent(data, id){
  var total = getCurrentTotal(data, id);
  var target = getCurrentTargetTotal(data, id);
  return Math.min(100, Math.round((total / Math.max(1, target)) * 100));
}
function calcLevel(data, id){
  var percent = calcOverallPercent(data, id);
  if(percent < 25) return "מתחיל 🟢";
  if(percent < 50) return "מתקדם 🔵";
  if(percent < 75) return "אלוף 🟣";
  return "כוכב על 👑";
}
function buildLevelMessage(data, id){
  var percent = calcOverallPercent(data, id);
  var target = getCurrentTargetTotal(data, id);
  var total = getCurrentTotal(data, id);
  var left = Math.max(0, target - total);
  if(percent >= 90) return "וואו! אתה ממש רגע מדרגה הבאה 🚀";
  if(percent >= 75) return "עוד קצת ואתה כוכב על 👑";
  if(percent >= 50) return "אתה מתקדם מעולה 💪";
  if(percent >= 25) return "כל הכבוד, כבר התחלת לטפס 🌟";
  return left > 0 ? "יאללה, חסרים עוד " + left + " כוכבים ליעד הגדול ✨" : "בוא נתחיל לצבור כוכבים ✨";
}

            <h3 style="margin-top:0">🔐 שינוי סיסמה ועיצוב אישי</h3>

            <input id="kidNewPass" type="password" placeholder="סיסמה חדשה">
            <div style="margin-top:6px; font-size:14px; color:#6b7280;">
              <label style="display:inline-flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" onchange="togglePasswordVisibility('kidNewPass', this)">הצג סיסמה
              </label>

            <input id="kidNewColor" type="color" value="${childConfig(id).color || '#3b82f6'}">
            <div class="small">תצוגה מקדימה</div>

            <div style="margin-top:8px">
              <button onclick="saveChildAppearance('${id}')">שמור עיצוב אישי</button>
            </div>
          </div><div style="margin-top:14px"><button class="secondary" onclick="home()">חזרה</button></div></div>`;
  var emojiInput = document.getElementById('kidNewEmoji');

async function requestQuickTask(childId, role, taskIndex){
  var task = APP_SETTINGS.presetTasks[childId]?.[role]?.[taskIndex];
  if(!task) return;
  var data = await getChildData(childId);
  if((data.pendingTasks||[]).some(pt=>pt.role===role && pt.taskIndex===taskIndex && pt.status==='pending')){ alert('המשימה הזאת כבר ממתינה לבדיקה ⏳'); return; }
  data.pendingTasks.unshift({ id:'pt_'+Date.now(), role:role, taskIndex:taskIndex, taskName:task.name, stars:safeNumber(task.stars), status:'pending', requestedAtText:nowText(), requestedAtMillis:Date.now() });
  data.logs.unshift({ parent:role, action:'task_pending', amount:safeNumber(task.stars), note:task.name, createdAtText:nowText(), createdAtMillis:Date.now() });
  data.logs = data.logs.slice(0,100);
  await saveChildData(childId, data);
  alert('המשימה נשלחה לבדיקה ✅');
  child(childId);
}
async function requestShopPurchase(childId, itemIndex){
  var item = APP_SETTINGS.sharedShop[itemIndex];
  if(!item) return;
  var data = await getChildData(childId);
  var total = getCurrentTotal(data, childId);
  if(total < safeNumber(item.price)){ alert('אין מספיק כוכבים בשביל הפרס הזה 😅'); return; }
  if((data.pendingShopRequests||[]).some(req=>req.itemIndex===itemIndex && req.status==='pending')){ alert('הפרס הזה כבר ממתין לאישור ⏳'); return; }
  data.pendingShopRequests.unshift({ id:'shop_'+Date.now(), itemIndex:itemIndex, itemName:item.name, price:safeNumber(item.price), status:'pending', requestedAtText:nowText(), requestedAtMillis:Date.now() });
  data.logs.unshift({ parent:user||'mother', action:'shop_pending', amount:safeNumber(item.price), note:'בקשה למימוש פרס: '+item.name, createdAtText:nowText(), createdAtMillis:Date.now() });
  data.logs = data.logs.slice(0,100);
  await saveChildData(childId, data);
  alert('הבקשה נשלחה לאישור 🎁');
  child(childId);
}
async function approvePendingTask(childId, taskId){
  var data = await getChildData(childId);
  var idx = (data.pendingTasks||[]).findIndex(pt=>pt.id===taskId);
  if(idx===-1) return;
  var pt = data.pendingTasks[idx];
  if(pt.role !== user){ alert('אפשר לאשר רק משימות שלך'); return; }
  data.scores[pt.role] = safeNumber(data.scores[pt.role]) + safeNumber(pt.stars);
  data.pendingTasks.splice(idx,1);
  data.logs.unshift({ parent:pt.role, action:'task_approved', amount:safeNumber(pt.stars), note:pt.taskName, createdAtText:nowText(), createdAtMillis:Date.now() });
  data.logs = data.logs.slice(0,100);
  await saveChildData(childId,data);
  alert('המשימה אושרה 🌟');
  parent(user);
}
async function rejectPendingTask(childId, taskId){
  var data = await getChildData(childId);
  var idx = (data.pendingTasks||[]).findIndex(pt=>pt.id===taskId);
  if(idx===-1) return;
  var pt = data.pendingTasks[idx];
  if(pt.role !== user){ alert('אפשר לדחות רק משימות שלך'); return; }
  data.pendingTasks.splice(idx,1);
  data.logs.unshift({ parent:pt.role, action:'task_rejected', amount:safeNumber(pt.stars), note:pt.taskName, createdAtText:nowText(), createdAtMillis:Date.now() });
  data.logs = data.logs.slice(0,100);
  await saveChildData(childId,data);
  alert('המשימה נדחתה');
  parent(user);
}
async function approvePendingShop(childId, requestId){
  var data = await getChildData(childId);
  var idx = (data.pendingShopRequests||[]).findIndex(req=>req.id===requestId);
  if(idx===-1) return;
  var req = data.pendingShopRequests[idx];
  if(!userCanManageChild(user, childId)){ alert('אין לך הרשאה לילד הזה'); return; }
  var price = safeNumber(req.price);
  var allowed = getAllowedParentsForChild(childId);
  var left = price;
  var pools = allowed.map(function(parentId){ return {key:parentId, value:safeNumber(data.scores[parentId])}; }).sort((a,b)=>b.value-a.value);
  pools.forEach(function(pool){ if(left<=0) return; var take = Math.min(pool.value,left); data.scores[pool.key] = Math.max(0,safeNumber(data.scores[pool.key])-take); left -= take; });
  data.pendingShopRequests.splice(idx,1);
  data.logs.unshift({ parent:user, action:'shop_approved', amount:price, note:'אושר מימוש פרס: '+req.itemName, createdAtText:nowText(), createdAtMillis:Date.now() });
  data.logs = data.logs.slice(0,100);
  await saveChildData(childId,data);
  alert('הפרס אושר 🎉');
  parent(user);
}
async function rejectPendingShop(childId, requestId){
  var data = await getChildData(childId);
  var idx = (data.pendingShopRequests||[]).findIndex(req=>req.id===requestId);
  if(idx===-1) return;
  var req = data.pendingShopRequests[idx];
  if(!userCanManageChild(user, childId)){ alert('אין לך הרשאה לילד הזה'); return; }
  data.pendingShopRequests.splice(idx,1);
  data.logs.unshift({ parent:user, action:'shop_rejected', amount:safeNumber(req.price), note:'נדחתה בקשת פרס: '+req.itemName, createdAtText:nowText(), createdAtMillis:Date.now() });
  data.logs = data.logs.slice(0,100);
  await saveChildData(childId,data);
  alert('הבקשה נדחתה');
  parent(user);
}
async function loadPendingApprovals(role){
  var ids = Object.keys(APP_SETTINGS.childrenDirectory).filter(childId=>userCanManageChild(role, childId));
  var parts = [];
  for(var i=0;i<ids.length;i++){ var id=ids[i]; var data=await getChildData(id);
    (data.pendingTasks||[]).filter(pt=>pt.status==='pending' && pt.role===role).forEach(function(pt){ parts.push(`<div class="task-line"><div><strong>${childLabel(id)}</strong> • ${pt.taskName} • ${pt.stars} כוכבים<div class="small">${pt.requestedAtText||''}</div></div><div><button class="mini" onclick="approvePendingTask('${id}','${pt.id}')">אשר</button><button class="danger mini" onclick="rejectPendingTask('${id}','${pt.id}')">דחה</button></div></div>`); });
    (data.pendingShopRequests||[]).filter(req=>req.status==='pending').forEach(function(req){ parts.push(`<div class="task-line"><div><strong>${childLabel(id)}</strong> • בקשת פרס: ${req.itemName} • ${req.price} כוכבים<div class="small">${req.requestedAtText||''}</div></div><div><button class="mini shop" onclick="approvePendingShop('${id}','${req.id}')">אשר פרס</button><button class="danger mini" onclick="rejectPendingShop('${id}','${req.id}')">דחה</button></div></div>`); });
  }
  var el=document.getElementById('pendingApprovals'); if(el) el.innerHTML = parts.length ? parts.join('') : '<div class="small">אין משימות או פרסים שמחכים לאישור כרגע</div>';
}
async function loadParentSummary(role){
  var ids = Object.keys(APP_SETTINGS.childrenDirectory).filter(childId=>userCanManageChild(role, childId));
  var html = "";
  for(var i=0;i<ids.length;i++){ var id=ids[i]; var data=await getChildData(id); var total=getCurrentTotal(data,id); var target=getCurrentTargetTotal(data,id); var level=calcLevel(data,id);
    var logsHtml=(data.logs||[]).slice(0,20).map(function(item){ return `<div class="log-item" style="margin:6px 0; padding:8px; font-size:13px;"><div><strong>${parentLabel(item.parent)||item.parent}</strong> • ${actionLabel(item.action)}${item.amount ? ' • '+item.amount+' כוכבים' : ''}</div><div>${item.note||''}</div><div class="small">${item.createdAtText||''}</div></div>`; }).join('');
    html += `<div class="summary-card"><div style="font-size:22px;margin-bottom:8px">${childEmoji(id)} <strong>${childLabel(id)}</strong></div><div><strong>סה״כ:</strong> ${total} / יעד ${target}</div><div class="level-chip">${level}</div>${getAllowedParentsForChild(id).map(parentId=>`<div><strong>מ${parentLabel(parentId)}:</strong> ${safeNumber(data.scores[parentId])} / יעד ${safeNumber(data.targets[parentId])||100}</div>`).join('')}<div class="logs-title">לוגים</div><div class="logs-box">${logsHtml || '<div class="small" style="text-align:center; padding:8px 0;">אין לוגים עדיין</div>'}</div></div>`;
  }
  var el=document.getElementById('parentSummary'); if(el) el.innerHTML=html;
}
function renderPresetTasksEditor(role){
  var childId = getSelectedChild();
  var tasks = APP_SETTINGS.presetTasks[childId]?.[role] || [];
  return `<div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#f0fdf4);"><h3 style="margin-top:0">משימות מוכנות של ${parentLabel(role)} עבור ${childLabel(childId)}</h3><div class="small">אפשר לשמור עד 3 משימות לילד הזה</div><input id="taskName" placeholder="שם המשימה" style="width:90%;"><input id="taskStars" type="number" placeholder="כמה כוכבים" style="width:90%;"><br><button onclick="addPresetTask('${role}')">שמור משימה</button><div style="margin-top:10px; text-align:right;">${tasks.length ? tasks.map((task,index)=>`<div class="task-line"><div><strong>${task.name}</strong> • ${task.stars} כוכבים</div><button class="danger mini" onclick="removePresetTask('${role}','${childId}',${index})">מחק</button></div>`).join('') : '<div class="small">אין משימות מוכנות עדיין לילד הזה</div>'}</div></div>`;
}
function renderShopEditor(){
  return `<div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#ecfdf5);"><h3 style="margin-top:0">ניהול חנות פרסים משותפת</h3><input id="shopName" placeholder="שם הפרס" style="width:90%;"><input id="shopPrice" type="number" placeholder="מחיר בכוכבים" style="width:90%;"><br><button class="shop" onclick="addShopItem()">הוסף פרס</button><div style="margin-top:10px; text-align:right;">${APP_SETTINGS.sharedShop.length ? APP_SETTINGS.sharedShop.map((item,index)=>`<div class="shop-line"><div><strong>${item.name}</strong> • ${item.price} כוכבים</div><button class="danger mini" onclick="removeShopItem(${index})">מחק</button></div>`).join('') : '<div class="small">אין פרסים בחנות עדיין</div>'}</div></div>`;
}
function parent(role){
  user = role;
  var ids = Object.keys(APP_SETTINGS.childrenDirectory).filter(childId=>userCanManageChild(role, childId));
  if(!ids.length){ alert('אין לך כרגע ילדים מורשים'); home(); return; }
  if(!SELECTED_PARENT_CHILD[role] || !ids.includes(SELECTED_PARENT_CHILD[role])) SELECTED_PARENT_CHILD[role] = ids[0];
  var childRadioOptions = ids.map(function(childId){ return `<label style="display:inline-flex;align-items:center;gap:8px;margin:6px 10px;"><input type="radio" name="childChoice" value="${childId}" ${SELECTED_PARENT_CHILD[role]===childId?'checked':''} onchange="setSelectedChild('${role}','${childId}')"> ${childLabel(childId)}</label>`; }).join('');
  document.getElementById("app").innerHTML = `<div class="card app-shimmer" style="max-width:980px;"><h2>${parentLabel(role)}</h2><div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#f8fafc);"><div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;"><h3 style="margin:0">כמה כוכבים יש לכל ילד</h3><button onclick="parent(user)">רענן 🔄</button></div><div id="parentSummary" class="row three"><div class="small">טוען נתונים...</div></div></div><div class="card" style="background:#fafafa; margin-top:0;"><h3 style="margin-top:0">בחר ילד</h3><div>${childRadioOptions}</div></div><div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#f8fbff);"><h3 style="margin-top:0">ניהול כוכבים</h3><input id="amount" type="number" value="1" placeholder="כמות כוכבים" style="width:90%;"><input id="note" placeholder="על מה הכוכבים או ההורדה" style="width:90%;"><br><button onclick="addStars()">הוסף</button><button onclick="removeStars()">הסר</button></div><div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#fff8fb);"><h3 style="margin-top:0">הגדרת יעד ופרס</h3><input id="target" type="number" placeholder="יעד" style="width:90%;"><input id="reward" placeholder="מתנה" style="width:90%;"><br><button onclick="saveTarget()">שמור יעד</button><button onclick="redeem()">מימוש פרס</button></div>${renderPresetTasksEditor(role)}<div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#fff7ed);"><h3 style="margin-top:0">בקשות שמחכות לאישור</h3><div id="pendingApprovals"><div class="small">טוען בקשות...</div></div></div>${renderShopEditor()}<div class="card" style="margin-top:0; background:linear-gradient(180deg,#ffffff,#f5f9ff);"><h3 style="margin-top:0">שינוי סיסמת משתמש</h3><input id="newPass" type="password" placeholder="סיסמה חדשה"><br><button onclick="changePassword()">שמור סיסמה חדשה</button></div><button class="secondary" onclick="home()">חזרה</button></div>`;
  loadParentSummary(role); loadPendingApprovals(role);
}
async function addPresetTask(role){
  var name=document.getElementById('taskName').value.trim();
  var stars=Number(document.getElementById('taskStars').value);
  var childId=getSelectedChild();
  if(!name || !stars || stars<1){ alert('מלא שם משימה וכמות כוכבים תקינה'); return; }
  APP_SETTINGS.presetTasks[childId][role]=APP_SETTINGS.presetTasks[childId][role]||[];
  if(APP_SETTINGS.presetTasks[childId][role].length>=3){ alert('אפשר לשמור עד 3 משימות מוכנות לילד הזה'); return; }
  APP_SETTINGS.presetTasks[childId][role].push({name:name, stars:stars});
  await saveAppSettings(); alert('המשימה נשמרה עבור ' + childLabel(childId)); parent(user);
}
async function removePresetTask(role, childId, index){ APP_SETTINGS.presetTasks[childId][role].splice(index,1); await saveAppSettings(); parent(user); }
async function addShopItem(){ var name=document.getElementById('shopName').value.trim(); var price=Number(document.getElementById('shopPrice').value); if(!name||!price||price<1){alert('מלא שם פרס ומחיר תקין');return;} APP_SETTINGS.sharedShop.push({name:name, price:price}); await saveAppSettings(); alert('הפרס נוסף לחנות'); parent(user); }
async function removeShopItem(index){ APP_SETTINGS.sharedShop.splice(index,1); await saveAppSettings(); parent(user); }
function getSelectedChild(){ return SELECTED_PARENT_CHILD[user] || Object.keys(APP_SETTINGS.childrenDirectory)[0]; }
async function addStars(){ await change('add'); }
async function removeStars(){ await change('remove'); }
async function change(type){
  var child=getSelectedChild(); var amount=Number(document.getElementById('amount').value); var note=document.getElementById('note').value || '';
  if(!amount || amount<1){ alert('הכנס כמות תקינה'); return; }
  var data=await getChildData(child);
  data.scores[user] = type==='add' ? safeNumber(data.scores[user])+amount : Math.max(0, safeNumber(data.scores[user])-amount);
  data.logs.unshift({parent:user, action:type, amount:amount, note:note, createdAtText:nowText(), createdAtMillis:Date.now()});
  data.logs = data.logs.slice(0,100);
  await saveChildData(child,data); alert('עודכן'); parent(user);
}
async function saveTarget(){
  var child=getSelectedChild(); var target=Number(document.getElementById('target').value); var reward=document.getElementById('reward').value;
  if(!target || target<1){ alert('הכנס יעד תקין'); return; }
  var data=await getChildData(child); data.targets[user]=target; data.rewards[user]=reward;
  data.logs.unshift({parent:user, action:'target', note:'יעד: '+target+' | מתנה: '+reward, createdAtText:nowText(), createdAtMillis:Date.now() });
  data.logs = data.logs.slice(0,100);
  await saveChildData(child,data); alert('נשמר'); parent(user);
}
async function redeem(){
  var child=getSelectedChild(); var data=await getChildData(child); data.scores[user]=0;
  data.logs.unshift({parent:user, action:'redeem', note:'בוצע מימוש פרס ואיפוס המסלול', createdAtText:nowText(), createdAtMillis:Date.now()});
  data.logs = data.logs.slice(0,100);
  await saveChildData(child,data); alert('הפרס מומש והמסלול אופס'); parent(user);
}
async function changePassword(){ var newPass=document.getElementById('newPass').value; if(newPass===''){alert('הסיסמה לא יכולה להיות ריקה'); return;} PASSWORDS[user]=newPass; APP_SETTINGS.parentsDirectory[user].password=newPass; await saveAppSettings(); alert('הסיסמה נשמרה'); parent(user); }

async function saveChildAppearance(child){
  var newEmoji = (document.getElementById('kidNewEmoji')?.value || '').trim();
  var newColor = document.getElementById('kidNewColor')?.value || '';
  if(!APP_SETTINGS.childrenDirectory[child]) return;
  if(newEmoji) APP_SETTINGS.childrenDirectory[child].emoji = newEmoji;
  if(newColor) APP_SETTINGS.childrenDirectory[child].color = newColor;
  await saveAppSettings();
  alert('העיצוב החדש נשמר ✨');
  childLogin(child);
}

async function changeOwnChildPassword(child){ var newPass=document.getElementById('kidNewPass').value; if(newPass===''){alert('הסיסמה לא יכולה להיות ריקה'); return;} CHILD_PASSWORDS[child]=newPass; APP_SETTINGS.childrenDirectory[child].password=newPass; await saveAppSettings(); alert('הסיסמה החדשה נשמרה'); childLogin(child); }
function togglePasswordVisibility(inputId, checkboxEl){ var input=document.getElementById(inputId); if(!input) return; input.type = checkboxEl && checkboxEl.checked ? 'text' : 'password'; }
(async function start(){ try { await ensureSettings(); showSplash(); } catch(e) { document.getElementById('app').innerHTML=`<div class="card">שגיאה: ${(e && e.message) ? e.message : e}</div>`; } })();
