<!DOCTYPE html><html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כוכבים</title>  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff7ed, #ffe4e6);
      margin: 0;
      text-align: center;
      padding: 10px;
      color: #1f2937;
    }
    .card {
      background: rgba(255,255,255,.92);
      padding: 18px;
      border-radius: 24px;
      margin: 10px auto;
      box-shadow: 0 14px 34px rgba(0,0,0,.09);
      max-width: 980px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.7);
    }
    button {
      padding: 12px 14px;
      border: none;
      border-radius: 14px;
      margin: 5px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      font-size: 16px;
      box-shadow: 0 8px 18px rgba(37,99,235,.20);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(37,99,235,.24);
    }
    button:active { transform: scale(.98); }
    button.secondary {
      background: #fff;
      color: #1f2937;
      border: 1px solid #e5e7eb;
      box-shadow: none;
    }
    button.father { background: #3b82f6; }
    button.mother { background: #ec4899; }
    button.grandma { background: #8b5cf6; }
    button.danger { background: #dc2626; }

    input, select {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      margin: 5px;
      font-size: 16px;
      width: min(320px, 92%);
      box-sizing: border-box;
      background: #fff;
    }

    .progress {
      height: 14px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 10px;
    }
    .bar-f { height: 100%; background: linear-gradient(90deg, #60a5fa, #2563eb); }
    .bar-m { height: 100%; background: linear-gradient(90deg, #f472b6, #db2777); }
    .bar-g { height: 100%; background: linear-gradient(90deg, #a78bfa, #7c3aed); }

    .big { font-size: 28px; font-weight: bold; }
    .small { font-size: 13px; color: #666; }
    .hero { max-width: 860px; margin: 0 auto 14px; }

    .badge {
      width: 90px;
      height: 90px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fde68a, #fb7185);
      display: grid;
      place-items: center;
      font-size: 44px;
      margin: 10px auto 12px;
      box-shadow: 0 12px 24px rgba(0,0,0,.10);
    }

    .welcome-stage {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg,#fffaf0,#ffe4e6);
      border: 2px dashed #f9a8d4;
    }
    .welcome-title {
      font-size: 34px;
      font-weight: 900;
      color: #be185d;
      margin: 8px 0;
      animation: popIn .6s ease;
    }
    .welcome-sub {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 10px;
    }
    .floating-icons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .floating-icons span {
      font-size: 28px;
      animation: floaty 2.2s ease-in-out infinite;
    }
    .floating-icons span:nth-child(2){ animation-delay:.15s; }
    .floating-icons span:nth-child(3){ animation-delay:.3s; }
    .floating-icons span:nth-child(4){ animation-delay:.45s; }
    .floating-icons span:nth-child(5){ animation-delay:.6s; }
    .welcome-pill {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.85);
      box-shadow: 0 8px 18px rgba(251,113,133,.12);
      font-weight: bold;
      margin-top: 8px;
    }

    .kid-card {
      max-width: 860px;
      margin: 0 auto;
      background: linear-gradient(180deg, #ffffff, #fff7ed);
    }
    .kid-title { font-size: 34px; font-weight: 900; margin: 0; }
    .kid-sub { color: #6b7280; margin: 8px 0 0; }

    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 14px;
    }
    .row.three {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 8px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }
    .stat { border-radius: 20px; padding: 16px; }
    .stat.f { background: linear-gradient(135deg, #eff6ff, #dbeafe); }
    .stat.m { background: linear-gradient(135deg, #fdf2f8, #fce7f3); }
    .stat.g { background: linear-gradient(135deg, #f5f3ff, #ede9fe); }

    .summary-card {
      background: linear-gradient(180deg,#ffffff,#faf5ff);
      border-radius: 22px;
      padding: 14px;
      text-align: center;
      border: 1px solid #ede9fe;
      box-shadow: 0 10px 22px rgba(124,58,237,.10);
      position: relative;
      overflow: hidden;
      min-width: 280px;
      max-width: 280px;
      flex: 0 0 280px;
      scroll-snap-align: start;
    }
    .summary-card:after {
      content: "";
      position: absolute;
      top: 0;
      right: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
      transform: skewX(-20deg);
      animation: appShine 5.5s ease-in-out infinite;
    }

    .logs-box {
      margin-top: 10px;
      max-height: 220px;
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 8px;
      background: linear-gradient(180deg,#ffffff,#f8fafc);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.03);
      text-align: right;
    }
    .summary-scroll-hint {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }
    .logs-title {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
      color: #4b5563;
    }

    .goal {
      border-radius: 20px;
      padding: 16px;
      margin-top: 12px;
      text-align: right;
    }
    .goal.f { background: linear-gradient(135deg, #eff6ff, #bfdbfe); }
    .goal.m { background: linear-gradient(135deg, #fdf2f8, #fbcfe8); }
    .goal.g { background: linear-gradient(135deg, #f5f3ff, #ddd6fe); }

    .reward {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.7);
      font-weight: bold;
    }
    .win {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #dcfce7;
      color: #166534;
      font-weight: bold;
    }
    .tip {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: bold;
    }
    .tip.mother { background: #fdf2f8; color: #be185d; }
    .tip.grandma { background: #f5f3ff; color: #6d28d9; }

    .actions { margin-top: 14px; }
    hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 18px 0;
    }

    .log-item {
      background: #f9fafb;
      border-radius: 14px;
      padding: 10px;
      margin: 8px 0;
      text-align: right;
      border: 1px solid #eef2f7;
    }

    .app-shimmer {
      position: relative;
      overflow: hidden;
    }
    .app-shimmer:after {
      content: "";
      position: absolute;
      top: 0;
      right: -120%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
      transform: skewX(-20deg);
      animation: appShine 4.5s ease-in-out infinite;
    }

    .floaty { animation: floaty 2.6s ease-in-out infinite; }
    .pulse-close { animation: pulseClose 1.2s ease-in-out infinite; }
    .star-burst { position: relative; overflow: hidden; }
    .star-celebration {
      position: relative;
      margin: 12px 0 4px;
      padding: 12px 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
      font-weight: bold;
      box-shadow: 0 10px 24px rgba(245,158,11,.20);
      animation: popIn .55s ease;
    }
    .star-rain {
      pointer-events: none;
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .star-rain span {
      position: absolute;
      top: -10px;
      font-size: 22px;
      animation: starFall 1.8s linear forwards;
      opacity: .95;
    }
    .pop-number { animation: numberPulse 1.1s ease-in-out 2; }
    .shine-card { position: relative; overflow: hidden; }
    .shine-card:after {
      content: "";
      position: absolute;
      top: 0;
      right: -120%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent);
      transform: skewX(-20deg);
      animation: shineMove 2.4s ease-in-out infinite;
    }

    @keyframes floaty {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes pulseClose {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes popIn {
      0% { transform: scale(.85); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes starFall {
      0% { transform: translateY(0) rotate(0deg) scale(.7); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(220px) rotate(180deg) scale(1.15); opacity: 0; }
    }
    @keyframes numberPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes shineMove {
      0% { right: -120%; }
      100% { right: 160%; }
    }
    @keyframes appShine {
      0% { right: -120%; }
      100% { right: 180%; }
    }
    @keyframes spinStar {
      0% { transform: rotate(0deg) scale(0.9); }
      50% { transform: rotate(180deg) scale(1.08); }
      100% { transform: rotate(360deg) scale(0.9); }
    }
    @keyframes fadeRise {
      0% { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes lionBounce {
      0%,100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-14px) rotate(-8deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-10px) rotate(8deg); }
    }
    @keyframes giftPulse {
      0%,100% { transform: scale(1) rotate(0deg); }
      35% { transform: scale(1.08) rotate(-6deg); }
      70% { transform: scale(0.96) rotate(6deg); }
    }

    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .kid-title { font-size: 28px; }
    }
  </style></head>
<body>

    function safeNumber(v){ return Number(v || 0); }
    function parentLabel(role){
      if(role === "father") return "אבא";
      if(role === "mother") return "אמא";
      if(role === "grandma") return "סבתא שמחה";
      return role;
    }
    function childLabel(id){
      if(id === "meir") return "מאיר";
      if(id === "lavi") return "לביא";
      if(id === "itai") return "איתי";
      if(id === "noya") return "נויה";
      return id;
    }
    function childEmoji(id){
      if(id === "meir") return "🦁";
      if(id === "lavi") return "🐯";
      if(id === "itai") return "🐻";
      if(id === "noya") return "🦋";
      return "⭐";
    }
    function actionLabel(action){
      if(action === "add") return "קיבל";
      if(action === "remove") return "ירד";
      if(action === "target") return "עודכן יעד";
      if(action === "redeem") return "מימוש פרס";
      if(action === "password") return "שינוי סיסמה";
      if(action === "clearlogs") return "ניקוי לוגים";
      if(action === "clearalllogs") return "ניקוי כל הלוגים";
      if(action === "reset") return "איפוס מלא";
      return "עדכון";
    }
    function encouragementText(current, target, who){
      var percent = Math.round((current / Math.max(1, target)) * 100);
      if(current >= target) return "אלוף! הגעת ליעד של " + who + " 🎉";
      if(percent >= 90) return "וואו, אתה ממש רגע מהיעד של " + who + "! 🚀";
      if(percent >= 75) return "מדהים! עוד קצת ואתה מגיע ליעד של " + who + " ⭐";
      if(percent >= 50) return "חצי דרך כבר מאחוריך מול " + who + " 💪";
      if(percent >= 25) return "איזה יופי, אתה מתקדם נהדר מול " + who + " 🌟";
      return "התחלה מצוינת, ממשיכים לאסוף כוכבים מול " + who + " ✨";
    }
    function nowText(){
      return new Intl.DateTimeFormat("he-IL", { dateStyle:"short", timeStyle:"short" }).format(new Date());
    }
    function getParentColorClass(role){
      if(role === "father") return "f";
      if(role === "mother") return "m";
      return "g";
    }
    function getParentBarClass(role){
      if(role === "father") return "bar-f";
      if(role === "mother") return "bar-m";
      return "bar-g";
    }
    function getParentTipClass(role){
      if(role === "father") return "tip";
      if(role === "mother") return "tip mother";
      return "tip grandma";
    }

    async function ensureSettings(){
      var ref = db.collection("settings").doc("app");
      var snap = await ref.get();

      if(!snap.exists){
        PASSWORDS = {
          father: DEFAULT_PASSWORDS.father,
          mother: DEFAULT_PASSWORDS.mother,
          grandma: DEFAULT_PASSWORDS.grandma
        };
        CHILD_PASSWORDS = {
          meir: DEFAULT_CHILD_PASSWORDS.meir,
          lavi: DEFAULT_CHILD_PASSWORDS.lavi,
          itai: DEFAULT_CHILD_PASSWORDS.itai,
          noya: DEFAULT_CHILD_PASSWORDS.noya
        };

        await ref.set({ passwords: PASSWORDS, childPasswords: CHILD_PASSWORDS });
      } else {
        var data = snap.data() || {};
        var savedPasswords = data.passwords || {};
        var savedChildPasswords = data.childPasswords || {};

        PASSWORDS = {
          father: savedPasswords.father || DEFAULT_PASSWORDS.father,
          mother: savedPasswords.mother || DEFAULT_PASSWORDS.mother,
          grandma: savedPasswords.grandma || DEFAULT_PASSWORDS.grandma
        };
        CHILD_PASSWORDS = {
          meir: savedChildPasswords.meir || DEFAULT_CHILD_PASSWORDS.meir,
          lavi: savedChildPasswords.lavi || DEFAULT_CHILD_PASSWORDS.lavi,
          itai: savedChildPasswords.itai || DEFAULT_CHILD_PASSWORDS.itai,
          noya: savedChildPasswords.noya || DEFAULT_CHILD_PASSWORDS.noya
        };

        await ref.set({ passwords: PASSWORDS, childPasswords: CHILD_PASSWORDS }, { merge:true });
      }
    }

    async function getChildData(id){
      var snap = await db.collection("children").doc(id).get();
      return snap.data() || {
        father: 0,
        mother: 0,
        grandma: 0,
        targetFather: 100,
        targetMother: 100,
        targetGrandma: 100,
        rewardFather: "",
        rewardMother: "",
        rewardGrandma: "",
        logs: []
      };
    }

    function home(){
      document.getElementById("app").innerHTML = `
        <div class="hero">
          <div class="badge">⭐</div>
          <div class="card app-shimmer">
            <h2 style="margin:0 0 8px">אפליקציית הכוכבים</h2>
            <div class="small">מאיר, לביא, איתי ונויה רואים כוכבים נפרדים מבני המשפחה, עם יעדים, מתנות והיסטוריה</div>
            <div class="actions">

              <button onclick="showMoreKids()">עוד ילדים ➕</button>
              <br><br>
              <button class="father" onclick="login('father')">כניסת אבא</button>
              <button class="mother" onclick="login('mother')">כניסת אמא</button>
              <button class="grandma" onclick="login('grandma')">כניסת סבתא שמחה</button>
            </div>
            <div style="text-align:center; margin-top:18px; font-size:13px; color:#94a3b8; opacity:0.95;">
              גרסה ${APP_VERSION}
            </div>
          </div>
        </div>
      `;
    }

    function showSplash(){
      var variants = [
        {
          icon: '⭐',
          iconStyle: 'font-size:88px; animation:spinStar 2.8s linear infinite; filter:drop-shadow(0 8px 18px rgba(251,191,36,.35));',
          title: 'אפליקציית הכוכבים',
          subtitle: 'של מאיר ולביא',
          note: 'כוכבים, פרסים, יעדים וחיוכים ✨',
          extras: '🦁 🐯 ⭐ 🎁'
        },
        {
          icon: '🦁',
          iconStyle: 'font-size:88px; animation:lionBounce 2.3s ease-in-out infinite; filter:drop-shadow(0 8px 18px rgba(251,146,60,.32));',

          subtitle: 'מוכנים לעולם של כוכבים?',
          note: 'כל כניסה היא התחלה של הרפתקה חדשה 🌟',
          extras: '🦁 ⭐ 🏆 ✨'
        },
        {

          subtitle: 'למסיבת הכוכבים של הילדים',

            <div style="font-size:34px; font-weight:900; color:#be185d; margin-top:12px; animation:fadeRise .7s ease both;">${splash.title}</div>
            <div style="font-size:22px; font-weight:700; color:#7c2d12; margin-top:8px; animation:fadeRise .7s ease .2s both;">${splash.subtitle}</div>

      document.getElementById("app").innerHTML = `
        <div class="hero">
          <div class="badge">🌟</div>
          <div class="card app-shimmer">
            <h2 style="margin:0 0 8px">עוד ילדים</h2>
            <div class="small">בחר את הילד או הילדה שתרצה להיכנס אליהם</div>
            <div class="actions">
              <button onclick="childLogin('itai')">🐻 איתי</button>

              <br><br>
              <button class="secondary" onclick="home()">חזרה</button>
            </div>
          </div>
        </div>
      `;
    }

    function login(role){
      document.getElementById("app").innerHTML = `
        <div class="card app-shimmer">
          <h2>${parentLabel(role)}</h2>
          <input id="pass" type="password" placeholder="הכנס סיסמה">
          <br>
          <button onclick="checkLogin('${role}')">כניסה</button>

          <button class="secondary" onclick="home()">חזרה</button>

    }

    function checkLogin(role){
      var pass = document.getElementById("pass").value;
      if(role === "father" && pass === MASTER_PASSWORD){
        masterView();
        return;
      }
      if(pass !== PASSWORDS[role]){
        alert("סיסמה שגויה");
        return;
      }
      parent(role);
    }

    function childLogin(id){
      var messages = [
        `שלום ${childLabel(id)} 🌟`,
        `איזה כיף שחזרת ${childLabel(id)} 🎉`,
        `${childLabel(id)}, מוכן לראות כמה כוכבים קיבלת? ⭐`,
        `ברוך הבא ${childLabel(id)} ✨`

    function buildGoalCard(title, current, target, reward, roleKey){
      var percent = Math.min(100, (current / Math.max(1, target)) * 100);
      var colorClass = getParentColorClass(roleKey);
      var barClass = getParentBarClass(roleKey);
      var tipClass = getParentTipClass(roleKey);
      return `
        <div class="goal ${colorClass} ${percent >= 90 && current < target ? 'pulse-close' : ''}">
          <div class="big" style="font-size:22px">🎯 ${title}</div>
          <div><strong>${current}</strong> מתוך <strong>${target}</strong></div>
          <div class="progress"><div class="${barClass}" style="width:${percent}%"></div></div>
          <div class="small">נשארו עוד ${Math.max(0, target - current)} כוכבים</div>
          <div class="reward">🎁 ${reward || 'עדיין לא הוגדרה מתנה'}</div>
          ${current >= target ? `<div class="win">כל הכבוד! הגעת ליעד 🎉</div>` : `<div class="${tipClass}">${encouragementText(current, target, title)}</div>`}
        </div>
      `;
    }

    function getSelectedChild(){
      var selected = document.querySelector('input[name="childChoice"]:checked');
      return selected ? selected.value : "meir";
    }

    async function addStars(){ await change("add"); }
    async function removeStars(){ await change("remove"); }

    async function change(type){
      var child = getSelectedChild();
      var amount = Number(document.getElementById("amount").value);
      var note = document.getElementById("note").value || "";
      if(!amount || amount < 1){
        alert("הכנס כמות תקינה");
        return;
      }

      var data = await getChildData(child);
      if(user === "father"){
        if(child === "itai" || child === "noya"){
          alert("לילדים האלה רק אמא נותנת כוכבים");
          return;
        }
        data.father = type === "add" ? safeNumber(data.father) + amount : Math.max(0, safeNumber(data.father) - amount);
      } else if(user === "mother"){
        data.mother = type === "add" ? safeNumber(data.mother) + amount : Math.max(0, safeNumber(data.mother) - amount);
      } else if(user === "grandma"){
        if(child === "itai" || child === "noya"){
          alert("סבתא שמחה יכולה לתת כוכבים רק למאיר וללביא");
          return;
        }
        data.grandma = type === "add" ? safeNumber(data.grandma) + amount : Math.max(0, safeNumber(data.grandma) - amount);
      }

      var logs = data.logs || [];
      logs.unshift({ parent: user, action: type, amount: amount, note: note, createdAtText: nowText(), createdAtMillis: Date.now() });
      data.logs = logs.slice(0,100);
      await db.collection("children").doc(child).set(data, { merge:true });
      alert("עודכן");
      parent(user);
    }

    async function saveTarget(){
      var child = getSelectedChild();
      var target = Number(document.getElementById("target").value);
      var reward = document.getElementById("reward").value;
      if(!target || target < 1){
        alert("הכנס יעד תקין");
        return;
      }

      var data = await getChildData(child);
      if(user === "father"){
        if(child === "itai" || child === "noya"){
          alert("לילדים האלה רק אמא יש יעד ומתנה");
          return;
        }
        data.targetFather = target;
        data.rewardFather = reward;
      } else if(user === "mother"){
        data.targetMother = target;
        data.rewardMother = reward;
      } else if(user === "grandma"){
        if(child === "itai" || child === "noya"){
          alert("סבתא שמחה יכולה להגדיר יעד רק למאיר וללביא");
          return;
        }
        data.targetGrandma = target;
        data.rewardGrandma = reward;
      }

      var logs = data.logs || [];
      logs.unshift({ parent: user, action: "target", note: "יעד: " + target + " | מתנה: " + reward, createdAtText: nowText(), createdAtMillis: Date.now() });
      data.logs = logs.slice(0,100);
      await db.collection("children").doc(child).set(data, { merge:true });
      alert("נשמר");
      parent(user);
    }

    async function redeem(){
      var child = getSelectedChild();
      var data = await getChildData(child);
      if(user === "father"){
        if(child === "itai" || child === "noya"){
          alert("לילדים האלה רק אמא יכולה לממש פרס");
          return;
        }
        data.father = 0;
      } else if(user === "mother"){
        data.mother = 0;
      } else if(user === "grandma"){
        if(child === "itai" || child === "noya"){
          alert("סבתא שמחה יכולה לממש פרס רק למאיר וללביא");
          return;
        }
        data.grandma = 0;
      }

      var logs = data.logs || [];

      data.logs = logs.slice(0,100);
      await db.collection("children").doc(child).set(data, { merge:true });
      alert("הפרס מומש והמסלול אופס");
      parent(user);
    }

    async function changePassword(){
      var newPass = document.getElementById("newPass").value;
      if(newPass === ""){
        alert("הסיסמה לא יכולה להיות ריקה");
        return;
      }
      PASSWORDS[user] = newPass;
      await db.collection("settings").doc("app").set({ passwords: PASSWORDS, childPasswords: CHILD_PASSWORDS }, { merge:true });
      alert("הסיסמה נשמרה");
      parent(user);
    }

    function togglePasswordVisibility(inputId, checkboxEl){
      var input = document.getElementById(inputId);
      if(!input) return;
      input.type = checkboxEl && checkboxEl.checked ? "text" : "password";
    }

    async function changeOwnChildPassword(child){
      var newPass = document.getElementById("kidNewPass").value;
      if(newPass === ""){
        alert("הסיסמה לא יכולה להיות ריקה");
        return;
      }
      CHILD_PASSWORDS[child] = newPass;
      await db.collection("settings").doc("app").set({ passwords: PASSWORDS, childPasswords: CHILD_PASSWORDS }, { merge:true });
      alert("הסיסמה החדשה נשמרה");
      childLogin(child);
    }

    async function clearChildLogs(){
      var child = getSelectedChild();
      var ok = confirm("לנקות את כל הלוגים של " + childLabel(child) + "?");
      if(!ok) return;
      var data = await getChildData(child);
      data.logs = [];
      await db.collection("children").doc(child).set(data, { merge:true });
      alert("הלוגים של " + childLabel(child) + " נוקו");
      parent(user);
    }

    async function clearAllLogs(){
      var ok = confirm("לנקות את כל הלוגים של כל הילדים?");
      if(!ok) return;
      var children = ["meir","lavi","itai","noya"];
      for(var i = 0; i < children.length; i++){
        var childId = children[i];
        var data = await getChildData(childId);
        data.logs = [];
        await db.collection("children").doc(childId).set(data, { merge:true });
      }
      alert("כל הלוגים נוקו");
      parent(user);
    }

    async function resetAll(){
      var ok = confirm("אתה בטוח שאתה רוצה לאפס את כל המערכת? זה יאפס כוכבים, יעדים, מתנות, לוגים וסיסמאות.");
      if(!ok) return;

      var children = ["meir","lavi","itai","noya"];
      for(var i = 0; i < children.length; i++){
        await db.collection("children").doc(children[i]).set({
          father: 0,
          mother: 0,
          grandma: 0,
          targetFather: 100,
          targetMother: 100,
          targetGrandma: 100,
          rewardFather: "",
          rewardMother: "",
          rewardGrandma: "",
          logs: [{ parent: user, action: "reset", note: "בוצע איפוס מלא למערכת", createdAtText: nowText(), createdAtMillis: Date.now() }]
        });
      }

      PASSWORDS = { father: DEFAULT_PASSWORDS.father, mother: DEFAULT_PASSWORDS.mother, grandma: DEFAULT_PASSWORDS.grandma };
      CHILD_PASSWORDS = { meir: DEFAULT_CHILD_PASSWORDS.meir, lavi: DEFAULT_CHILD_PASSWORDS.lavi, itai: DEFAULT_CHILD_PASSWORDS.itai, noya: DEFAULT_CHILD_PASSWORDS.noya };
      await db.collection("settings").doc("app").set({ passwords: PASSWORDS, childPasswords: CHILD_PASSWORDS }, { merge:true });
      alert("המערכת אופסה בהצלחה");
      home();
    }

    (async function start(){
      try {
        await ensureSettings();
        showSplash();
      } catch (e) {
        document.getElementById("app").innerHTML = `<div class="card">שגיאה: ${(e && e.message) ? e.message : e}</div>`;
      }
    })();
  </script></body>
</html>
